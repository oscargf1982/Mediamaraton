/* ============================================================
   DASHBOARD: métricas derivadas del historial de logs
   ============================================================ */

// devuelve {week, sessId} a partir de una clave "wN-sX"
function parseLogKey(key){
  const m=key.match(/^w(\d+)-(.+)$/);
  return m ? {week:parseInt(m[1]), sessId:m[2]} : null;
}

// minutos reales estimados de una sesión completada, a partir de su ritmo real si aplica
function loggedMinutes(sess, log, P){
  if(sess.gym) return 0;
  if(!sess.blocks) return estMinutes(sess,P); // tempo continuo, rodajes: duración no cambia con el ritmo logueado
  const mwb=mainWorkBlock(sess.blocks);
  if(!mwb || !log.pace) return estMinutes(sess,P);
  const reps=log.repsDone!=null?log.repsDone:mwb.reps;
  const b={...mwb, reps};
  const blocks=sess.blocks.map(x=>x===mwb?b:x);
  // usa el ritmo real logueado para el bloque de trabajo
  const Preal={...P, [mwb.paceKey]:{...P[mwb.paceKey], v:log.pace}};
  return blocksMinutes(blocks, Preal);
}

// recorre todas las semanas relevantes y construye un mapa semana -> {planned, done, minutes, qualityLogs:[...]}
function buildHistory(){
  const P=paces(state.fitnessPace,state.gap,state.event);
  const curWeek=currentWeekOf(state.startDate,state.totalWeeks);
  const weeks={};
  for(let w=1;w<=Math.min(curWeek,state.totalWeeks);w++){
    const sessions=buildWeek(w,state.profile.runDays,state.profile.gymDays,state.totalWeeks,state.event,state.goalPace);
    const plannedMin=sessions.reduce((s,x)=>s+estMinutes(x,P),0);
    let doneMin=0, doneCount=0, plannedCount=sessions.length;
    sessions.forEach(sess=>{
      const log=state.logs["w"+w+"-"+sess.id];
      if(log){ doneCount++; doneMin+=loggedMinutes(sess,log,P); }
    });
    weeks[w]={plannedMin,doneMin,doneCount,plannedCount,sessions};
  }
  return {weeks,curWeek,P};
}

// ACWR: carga aguda (última semana completa) / carga crónica (media de las 4 anteriores)
/* ============================================================
   LOGROS / INSIGNIAS
   ============================================================ */
const PACE_KEY_LABELS={short:"series cortas (≈5K)",vo2:"series (≈10K)",tempo:"umbral/tempo",race:"ritmo competición",mara:"rodaje activo",long:"tirada larga",easy:"rodaje suave"};

/* ============================================================
   FEED DEL ENTRENADOR: 1-3 mensajes proactivos según el estado actual
   ============================================================ */
function computeCoachFeed(history, achievements){
  const {weeks,curWeek}=history;
  const msgs=[]; // {icon, text, tone:"good"|"warn"|"info", action?:{label,attr}}

  // --- inactividad: días desde el último registro, si hay alguna sesión pendiente ---
  let lastLogDate=null;
  for(const key in state.logs){
    const log=state.logs[key];
    if(log && log.date){ const d=new Date(log.date); if(!lastLogDate||d>lastLogDate) lastLogDate=d; }
  }
  if(lastLogDate){
    const daysSince=Math.floor((Date.now()-lastLogDate.getTime())/86400000);
    const {sess:pending}=findTodaySession(curWeek, weeks[curWeek]||{sessions:[]});
    if(daysSince>=3 && pending){
      msgs.push({icon:"👋", tone:"warn",
        text:"Llevas "+daysSince+" días sin registrar ninguna sesión. Si te ha costado retomar, prueba con algo suave de 20-30 minutos para volver a la rutina sin presión."});
    }
  }

  // --- modo recuperación activo: recordatorio ---
  if(state.weekAdj && state.weekAdj.active){
    msgs.push({icon:"😴", tone:"info",
      text:"Sigues en modo recuperación: rodajes y tirada larga reducidos un 15% hasta la semana "+(state.weekAdj.since+1)+". Encadena un par de sesiones con buena sensación para volver al volumen normal."});
  }

  // --- carga alta (ACWR) sin modo recuperación activo ---
  if(!(state.weekAdj&&state.weekAdj.active)){
    const ac=acwr(history);
    if(ac.ratio!=null && ac.ratio>1.3){
      msgs.push({icon:"⚠️", tone:"warn",
        text:"Tu carga de esta semana está bastante por encima de tu media reciente (ratio "+ac.ratio.toFixed(2)+"). Si notas las piernas cargadas, pulsa el botón de abajo para activar el modo recuperación."});
    }
  }

  // --- racha positiva ---
  const st=streak(history);
  if(st>=3 && !(state.weekAdj&&state.weekAdj.active)){
    msgs.push({icon:"🔥", tone:"good",
      text:"Has completado "+st+" sesiones consecutivas. Buen trabajo — mantén la intensidad prevista y sigue así."});
  }

  // --- tendencia de forma ---
  const h=state.history;
  if(h.length>=2){
    const lookback=Math.min(4,h.length-1);
    const diff=h[h.length-1-lookback].pace - h[h.length-1].pace; // + = mejorando
    if(diff>=2){
      msgs.push({icon:"⚡", tone:"good",
        text:"Tu ritmo de fitness ha mejorado "+Math.round(diff)+" s/km en las últimas sesiones de calidad. Vas en buena dirección."});
    } else if(diff<=-2){
      msgs.push({icon:"📉", tone:"warn",
        text:"Tu ritmo de fitness ha bajado "+Math.abs(Math.round(diff))+" s/km últimamente. Puede ser fatiga acumulada — no fuerces si las sensaciones no acompañan."});
    }
  }

  // --- cerca de un logro (≥80% del objetivo, aún no conseguido) ---
  const close=achievements.filter(a=>!a.done && (a.progress/a.goal)>=0.8)
    .sort((a,b)=>(b.progress/b.goal)-(a.progress/a.goal))[0];
  if(close){
    const restante = close.unit==="%" ? Math.round(close.goal-close.progress)+"%" :
                     close.unit==="km" ? (close.goal-close.progress).toFixed(1)+" km" :
                     (close.goal-close.progress)+" más";
    msgs.push({icon:close.icon, tone:"info",
      text:"Estás muy cerca de conseguir \""+close.title+"\": te falta "+restante+"."});
  }

  // prioridad: avisos primero, luego info, luego positivos; máximo 3
  const order={warn:0, info:1, good:2};
  msgs.sort((a,b)=>order[a.tone]-order[b.tone]);
  return msgs.slice(0,3);
}

function computeAchievements(history){
  const {weeks,curWeek,P}=history;
  const ach=[];

  // --- Racha de sesiones (reutiliza streak()) ---
  const st=streak(history);
  [7,14,30].forEach(n=>{
    ach.push({
      id:"streak"+n, icon:"🔥",
      title: n+" sesiones seguidas",
      desc: "Encadena "+n+" sesiones registradas sin huecos.",
      done: st>=n,
      progress: Math.min(st,n), goal:n,
    });
  });

  // --- Consistencia: 4 semanas seguidas con >=90% de cumplimiento ---
  let consistentStreak=0, maxConsistentStreak=0;
  for(let w=1;w<=curWeek;w++){
    const wk=weeks[w]; if(!wk || wk.plannedCount===0) continue;
    const pct=wk.doneCount/wk.plannedCount;
    if(pct>=0.9){ consistentStreak++; maxConsistentStreak=Math.max(maxConsistentStreak,consistentStreak); }
    else consistentStreak=0;
  }
  ach.push({
    id:"consistency4", icon:"📈",
    title:"4 semanas al 90%+",
    desc:"Completa al menos el 90% de las sesiones durante 4 semanas consecutivas.",
    done: maxConsistentStreak>=4,
    progress: Math.min(maxConsistentStreak,4), goal:4,
  });

  // --- Tirada larga: primera vez que se alcanza cada distancia ---
  let maxLongKm=0;
  for(let w=1;w<=curWeek;w++){
    const wk=weeks[w]; if(!wk) continue;
    wk.sessions.forEach(sess=>{
      if(sess.gym || sess.tipo!=="LARGA") return;
      const log=state.logs["w"+w+"-"+sess.id]; if(!log) return;
      const plannedMin=estMinutes(sess,P);
      const km=plannedMin/(log.pace/60);
      if(km>maxLongKm) maxLongKm=km;
    });
  }
  [15,18,21].forEach(km=>{
    ach.push({
      id:"long"+km, icon:"🛣️",
      title:"Tirada larga de "+km+" km",
      desc:"Completa una tirada larga de al menos "+km+" km.",
      done: maxLongKm>=km,
      progress: Math.min(maxLongKm,km), goal:km, unit:"km",
    });
  });

  // --- Progreso del plan ---
  const totalSessions=(()=>{ let n=0; for(let w=1;w<=state.totalWeeks;w++) n+=buildWeek(w,state.profile.runDays,state.profile.gymDays,state.totalWeeks,state.event,state.goalPace).filter(s=>!s.gym).length; return n; })();
  let doneSessions=0;
  for(let w=1;w<=curWeek;w++){ const wk=weeks[w]; if(wk) doneSessions+=wk.doneCount; }
  const planPct = totalSessions>0 ? (doneSessions/totalSessions)*100 : 0;
  [25,50,75,100].forEach(p=>{
    ach.push({
      id:"plan"+p, icon: p===100?"🏆":"🎯",
      title: p===100?"Plan completado":p+"% del plan",
      desc: p===100?"Termina todas las sesiones del plan.":"Completa el "+p+"% de las sesiones del plan.",
      done: planPct>=p,
      progress: Math.min(planPct,p), goal:p, unit:"%",
    });
  });

  // --- Mejora de forma respecto al ritmo inicial ---
  const improved = state.fitnessPace < state.initialPace;
  ach.push({
    id:"fitness_improved", icon:"⚡",
    title:"Primera mejora de forma",
    desc:"Consigue que tu ritmo de fitness mejore respecto al inicial ("+fmtPace(state.initialPace)+" /km).",
    done: improved,
    progress: improved?1:0, goal:1,
  });

  // --- PRs de ritmo por tipo de bloque ---
  const bestByKey={};
  for(let w=1;w<=curWeek;w++){
    const wk=weeks[w]; if(!wk) continue;
    wk.sessions.forEach(sess=>{
      if(sess.gym) return;
      const log=state.logs["w"+w+"-"+sess.id]; if(!log) return;
      const mwb=sess.blocks?mainWorkBlock(sess.blocks):null;
      const key=mwb?mwb.paceKey:sess.paceKey;
      if(key==="easy"||key==="mara") return; // PRs solo en esfuerzos de calidad/tirada larga
      if(!bestByKey[key] || log.pace<bestByKey[key].pace) bestByKey[key]={pace:log.pace, week:w};
    });
  }
  Object.keys(PACE_KEY_LABELS).forEach(key=>{
    if(key==="easy"||key==="mara") return;
    const best=bestByKey[key];
    ach.push({
      id:"pr_"+key, icon:"🥇",
      title:"Mejor marca: "+PACE_KEY_LABELS[key],
      desc: best ? "Tu mejor ritmo registrado en "+PACE_KEY_LABELS[key]+" es "+fmtPace(best.pace)+" /km (semana "+best.week+")." : "Registra una sesión de "+PACE_KEY_LABELS[key]+" para empezar a guardar tu mejor marca.",
      done: !!best,
      progress: best?1:0, goal:1,
      value: best?fmtPace(best.pace)+" /km":null,
    });
  });

  return ach;
}


function acwr(history){
  const {weeks,curWeek}=history;
  const acute=weeks[curWeek-1]?weeks[curWeek-1].doneMin:(weeks[curWeek]?weeks[curWeek].doneMin:0);
  let chronicSum=0, chronicN=0;
  for(let w=curWeek-4;w<=curWeek-1;w++){ if(weeks[w]){ chronicSum+=weeks[w].doneMin; chronicN++; } }
  const chronic=chronicN?chronicSum/chronicN:acute;
  if(!chronic) return {ratio:null,acute,chronic};
  return {ratio:acute/chronic, acute, chronic};
}

// racha de sesiones de carrera registradas consecutivamente (sin huecos), contando hacia atrás desde hoy
function streak(history){
  const {weeks,curWeek}=history;
  let count=0;
  for(let w=curWeek;w>=1;w--){
    const wk=weeks[w]; if(!wk) break;
    const runs=wk.sessions.filter(s=>!s.gym);
    let brokeHere=false;
    for(let i=runs.length-1;i>=0;i--){
      const log=state.logs["w"+w+"-"+runs[i].id];
      if(log){ count++; continue; }
      if(w===curWeek){ continue; } // semana en curso: aún puede no haber llegado a esa sesión
      brokeHere=true; break;
    }
    if(brokeHere) break;
  }
  return count;
}

// últimas N sesiones de calidad registradas (con ritmo), más recientes primero
function recentQualityLogs(n){
  return Object.entries(state.logs)
    .filter(([k,l])=>l.pace)
    .map(([k,l])=>({...parseLogKey(k), ...l}))
    .sort((a,b)=> new Date(b.date)-new Date(a.date))
    .slice(0,n);
}

// predicción de marca actual (Riegel) para 5K/10K/HM/Maratón a partir del fitness actual
function predictTimes(){
  const f=state.fitnessPace; // s/km al ritmo equivalente de la prueba elegida
  const dCur=EVENTS[state.event].dist;
  const out={};
  for(const k in EVENTS){
    const d=EVENTS[k].dist;
    const t = f*dCur * Math.pow(d/dCur,1.06);
    out[k]=t;
  }
  return out;
}

// próxima sesión sin registrar (prioriza carrera sobre gimnasio), buscando primero
// en la semana actual y, si está completa, en las siguientes
/* ============================================================
   COACH POR REGLAS: respuestas rápidas a "¿cómo te encuentras?"
   ============================================================ */

// "Piernas cargadas": activa el modo recuperación manualmente, sin esperar
// a que el RPE de una sesión lo detecte. Reutiliza el mismo mecanismo que
// el ajuste automático (recorte 15% + posible posposición de la tirada larga).
function coachHeavyLegs(){
  const curWeek=currentWeekOf(state.startDate,state.totalWeeks);
  if(state.weekAdj && state.weekAdj.active){
    showToast("Ya tenías el modo recuperación activo: sigo con rodajes y tirada larga reducidos un 15% por ahora.");
    return;
  }
  if(!state.overrides) state.overrides={};
  state.weekAdj={active:true, reason:"manual", since:curWeek, postponedLong:false};
  let msg="Entendido, piernas cargadas. Reduzco rodajes y tirada larga un 15% esta semana y la próxima.";
  const hist=buildHistory();
  const longSess=hist.weeks[curWeek] && hist.weeks[curWeek].sessions.find(s=>s.tipo==="LARGA" && !state.logs["w"+curWeek+"-"+s.id]);
  if(longSess && curWeek<state.totalWeeks){
    postponeSession(curWeek, longSess);
    state.weekAdj.postponedLong=true;
    msg+=" También muevo tu tirada larga de esta semana a la siguiente, para dar margen a recuperar.";
  }
  save(); render(); showToast(msg);
}

// "No entrené ayer": pospone la sesión que la app considera "de hoy"
// (reutiliza exactamente la misma lógica de posponer que los botones de cada tarjeta).
function coachMissedYesterday(){
  const curWeek=currentWeekOf(state.startDate,state.totalWeeks);
  const hist=buildHistory();
  const wk=hist.weeks[curWeek]||{sessions:[]};
  const {sess:today, week:todayWeek}=findTodaySession(curWeek, wk);
  if(!today){ showToast("No encuentro ninguna sesión pendiente que mover. Vas al día."); return; }
  if(today.gym){ showToast("La próxima sesión pendiente es de gimnasio (\""+today.titulo+"\"). Puedes marcarla como hecha o eliminarla desde Entrenamientos si prefieres saltártela."); return; }
  postponeSession(todayWeek, today);
}

// "Hoy me encuentro genial": si había un modo recuperación activo, ofrece
// desactivarlo antes de tiempo; si no, solo da feedback positivo.
function coachFeelingGreat(){
  if(state.weekAdj && state.weekAdj.active){
    if(confirm("Tenías el modo recuperación activo (volumen reducido). ¿Quieres volver ya al volumen normal?")){
      state.weekAdj={active:false, reason:null, since:null, postponedLong:false};
      save(); render();
      showToast("¡Genial! Vuelves al volumen habitual del plan desde esta semana.");
      return;
    }
    showToast("Vale, lo dejamos como está por ahora. Si sigues bien un par de sesiones más, se desactivará solo.");
    return;
  }
  showToast("¡Genial! Aprovecha la frescura, pero no te dejes llevar más allá del ritmo previsto de hoy: la mejora viene de acumular, no de un solo día.");
}

function findTodaySession(curWeek, curWeekHist){
  const pending=curWeekHist.sessions.filter(s=>!state.logs["w"+curWeek+"-"+s.id]);
  let today=pending.find(s=>!s.gym) || pending[0] || null;
  let week=curWeek;
  if(!today){
    for(let w=curWeek+1; w<=state.totalWeeks; w++){
      const ss=buildWeek(w,state.profile.runDays,state.profile.gymDays,state.totalWeeks,state.event,state.goalPace);
      const pend=ss.filter(s=>!state.logs["w"+w+"-"+s.id]);
      const cand=pend.find(s=>!s.gym) || pend[0] || null;
      if(cand){ today=cand; week=w; break; }
    }
  }
  return {sess:today, week};
}

  let html='<div class="statRow">'+stat("Ritmo estimado hoy",fmtPace(cur),"/km",false)+stat("Te faltan",gap<=0?"0":Math.round(gap),"s/km",gap<=3)+stat("Sesiones de calidad",quality,"",false)+'</div>' +

/* ---------- estimación de volumen / carga ---------- */
function estMinutes(sess, P){
  if(sess.blocks) return blocksMinutes(sess.blocks, P);
  const t=sess.titulo, tipo=sess.tipo;
  const num=(re,d)=>{ const m=t.match(re); return m?parseInt(m[1]):d; };
  if(sess.gym) return 0;
  if(tipo==='RODAJE'||tipo==='LARGA') return num(/(\d+)′/,40);
  if(tipo==='ACTIVACIÓN') return 30;
  if(tipo==='CARRERA') return Math.round(EVENTS[state.event].dist*(P.race.v/60));
  if(tipo==='RITMO'){ const k=num(/(\d+)\s*km/,8); return Math.round(k*(P.race.v/60)+20); }
  if(tipo==='TEMPO'){
    if(/continuo/.test(t)) return num(/(\d+)′/,20)+30;
    let m=t.match(/(\d+)×(\d+)′/); if(m){ const r=+m[1],e=+m[2]; return r*e+(r-1)*3+30; }
    m=t.match(/(\d+)×(\d+)\s*m/); if(m){ const r=+m[1],d=+m[2]/1000; return Math.round(r*d*(P.tempo.v/60)+(r-1)*1.25+30); }
    return num(/(\d+)′/,20)+30;
  }
  if(tipo==='SERIES'||tipo==='FARTLEK'){
    let m=t.match(/(\d+)×(\d+)′\/(\d+)′/); if(m){ const r=+m[1]; return r*(+m[2]+ +m[3])+30; }
    m=t.match(/(\d+)×(\d+)\s*m/); if(m){ const r=+m[1],d=+m[2]/1000; const pace=P[sess.paceKey].v/60; const rec=d<=0.5?1:d<=1?1.5:2.5; return Math.round(r*d*pace+(r-1)*rec+30); }
    return 50;
  }
  return num(/(\d+)′/,45);
}
function weekVolume(w,P){
  const ss=buildWeek(w,state.profile.runDays,state.profile.gymDays,state.totalWeeks,state.event,state.goalPace);
  let easy=0,qual=0,gym=0;
  ss.forEach(s=>{ if(s.gym){gym++;return;} const m=estMinutes(s,P); if(s.quality)qual+=m; else easy+=m; });
  return {easy,qual,total:easy+qual,gym};
}

/* ============================================================
   REGISTRO EN DIRECTO (cronómetro + GPS)
   ============================================================ */
const EARTH_R=6371000; // metros
function haversine(a,b){
  const toRad=x=>x*Math.PI/180;
  const dLat=toRad(b.lat-a.lat), dLon=toRad(b.lon-a.lon);
  const s=Math.sin(dLat/2)**2 + Math.cos(toRad(a.lat))*Math.cos(toRad(b.lat))*Math.sin(dLon/2)**2;
  return 2*EARTH_R*Math.asin(Math.sqrt(s));
}

function startTracker(sessId, week){
  ui.tracker={
    sessId, week, status:"running",
    startTime:Date.now(), elapsedAtPause:0,
    points:[], distanceM:0, lastSpeed:0,
    watchId:null, wakeLock:null, wakeLockState:"pending", gpsError:null, gpsReady:false,
  };
  ui.modal=null;
  if(!("geolocation" in navigator)){
    ui.tracker.gpsError="Este dispositivo/navegador no soporta geolocalización. Puedes seguir con el cronómetro y meter el ritmo a mano al terminar.";
  } else {
    ui.tracker.watchId=navigator.geolocation.watchPosition(onGpsUpdate, onGpsError, {enableHighAccuracy:true, maximumAge:1000, timeout:10000});
  }
  requestWakeLock();
  if(!trackerVisHandler){
    trackerVisHandler=()=>{
      if(document.visibilityState==="visible" && ui.tracker && (ui.tracker.status==="running"||ui.tracker.status==="paused")){
        requestWakeLock();
      }
    };
    document.addEventListener("visibilitychange", trackerVisHandler);
  }
  if(!trackerTimer) trackerTimer=setInterval(()=>{ if(ui.tracker&&ui.tracker.status==="running") render(); },1000);
  render();
}
let trackerTimer=null;
let trackerVisHandler=null;
// pide (o vuelve a pedir) el bloqueo de pantalla; actualiza ui.tracker.wakeLockState
// para que la interfaz pueda mostrar si está realmente activo o no
function requestWakeLock(){
  if(!ui.tracker) return;
  if(!("wakeLock" in navigator)){
    ui.tracker.wakeLockState="unsupported";
    render();
    return;
  }
  navigator.wakeLock.request("screen").then(wl=>{
    if(!ui.tracker) { wl.release().catch(()=>{}); return; }
    ui.tracker.wakeLock=wl;
    ui.tracker.wakeLockState="active";
    wl.addEventListener("release", ()=>{
      if(ui.tracker && ui.tracker.wakeLock===wl){
        ui.tracker.wakeLock=null;
        // el navegador libera el wake lock al ocultar la pestaña; visibilitychange lo reintentará
        if(ui.tracker.status!=="done") ui.tracker.wakeLockState="failed";
        render();
      }
    });
    render();
  }).catch(()=>{
    ui.tracker.wakeLockState="failed";
    render();
  });
}
function onGpsUpdate(pos){
  if(!ui.tracker) return;
  ui.tracker.gpsReady=true; ui.tracker.gpsError=null;
  const {latitude:lat,longitude:lon,accuracy:acc,speed}=pos.coords;
  const p={lat,lon,t:(pos.timestamp||Date.now()),acc};
  // descarta lecturas muy imprecisas (típico: dentro de edificios)
  if(acc!=null && acc>30){ return; }
  const pts=ui.tracker.points;
  if(pts.length>0 && ui.tracker.status==="running"){
    const d=haversine(pts[pts.length-1],p);
    // descarta saltos absurdos (ruido de GPS), p.ej. >50m en <1s
    const dt=(p.t-pts[pts.length-1].t)/1000;
    if(dt>0 && d/dt<12){ // <12 m/s = 43 km/h, límite generoso para correr
      ui.tracker.distanceM+=d;
    }
  }
  ui.tracker.lastSpeed = speed!=null && speed>=0 ? speed*3.6 : ui.tracker.lastSpeed; // km/h
  pts.push(p);
  render();
}
function onGpsError(err){
  if(!ui.tracker) return;
  const msgs={1:"Permiso de ubicación denegado. Actívalo en los ajustes del navegador para usar el GPS.",2:"Señal GPS no disponible ahora mismo.",3:"GPS tardando en responder."};
  ui.tracker.gpsError=msgs[err.code]||"Error de GPS.";
  render();
}
function trackerElapsedMs(){
  if(!ui.tracker) return 0;
  if(ui.tracker.status==="running") return ui.tracker.elapsedAtPause + (Date.now()-ui.tracker.startTime);
  return ui.tracker.elapsedAtPause;
}
function pauseTracker(){
  if(!ui.tracker || ui.tracker.status!=="running") return;
  ui.tracker.elapsedAtPause=trackerElapsedMs();
  ui.tracker.status="paused";
  render();
}
function resumeTracker(){
  if(!ui.tracker || ui.tracker.status!=="paused") return;
  ui.tracker.status="running";
  ui.tracker.startTime=Date.now();
  render();
}
function stopTracker(){
  if(!ui.tracker) return;
  ui.tracker.elapsedAtPause=trackerElapsedMs();
  ui.tracker.status="done";
  if(ui.tracker.watchId!=null) navigator.geolocation.clearWatch(ui.tracker.watchId);
  if(ui.tracker.wakeLock) ui.tracker.wakeLock.release().catch(()=>{});
  clearInterval(trackerTimer); trackerTimer=null;
  render();
}
function discardTracker(){
  if(ui.tracker){
    if(ui.tracker.watchId!=null) navigator.geolocation.clearWatch(ui.tracker.watchId);
    if(ui.tracker.wakeLock) ui.tracker.wakeLock.release().catch(()=>{});
  }
  clearInterval(trackerTimer); trackerTimer=null;
  if(trackerVisHandler){ document.removeEventListener("visibilitychange", trackerVisHandler); trackerVisHandler=null; }
  ui.tracker=null;
  render();
}
// pasa los resultados del tracker al modal de registro y lo cierra
function applyTrackerToModal(){
  const t=ui.tracker;
  const km=t.distanceM/1000;
  const elapsedMin=trackerElapsedMs()/60000;
  const paceSecPerKm = km>0.05 ? (elapsedMin*60)/km : null;
  ui.modal={week:t.week, sessId:t.sessId, pace: paceSecPerKm?fmtPace(paceSecPerKm):null, rpe:null, note:null, repsDone:null};
  if(trackerVisHandler){ document.removeEventListener("visibilitychange", trackerVisHandler); trackerVisHandler=null; }
  ui.tracker=null;
  render();
}

function fmtClock(ms){
  const s=Math.floor(ms/1000);
  const h=Math.floor(s/3600), m=Math.floor((s%3600)/60), ss=s%60;
  return (h>0?h+":":"")+String(m).padStart(h>0?2:1,"0")+":"+String(ss).padStart(2,"0");
}

/* ---------- sincronizar inputs antes de re-render ---------- */
function syncObInputs(){
  if(!ui.ob) return;
  const g=(id)=>{ const el=document.getElementById(id); return el?el.value:undefined; };
  const map={raceDate:"ob-raceDate",age:"ob-age",height:"ob-height",weight:"ob-weight",c10:"ob-c10",cHM:"ob-cHM",t10:"ob-t10",tHM:"ob-tHM"};
  for(const k in map){ const v=g(map[k]); if(v!==undefined) ui.ob[k]=v; }
}
function syncCalcInputs(){
  const g=(id)=>{ const el=document.getElementById(id); return el?el.value:undefined; };
  const map={time:"calc-time",age:"calc-age",fcMax:"calc-fcmax",fcRest:"calc-fcrest"};
  for(const k in map){ const v=g(map[k]); if(v!==undefined) ui.calc[k]=v; }
}
function syncModalInputs(){
  if(!ui.modal) return;
  const p=document.getElementById("m-pace"), n=document.getElementById("m-note");
  if(p) ui.modal.pace=p.value; if(n) ui.modal.note=n.value;
}

/* ---------- eventos ---------- */
function wire(){
  const root=document.getElementById("root");
  const dateEl=document.getElementById("ob-raceDate");
  if(dateEl) dateEl.onchange=()=>{ syncObInputs(); render(); };
  root.onclick=(e)=>{
    const t=e.target.closest("[data-tab],[data-week],[data-log],[data-gym],[data-postpone],[data-delete],[data-undo-week],[data-swap],[data-reset],[data-newplan],[data-export],[data-rpe],[data-reps],[data-sel],[data-day],[data-setday],[data-calmonth],[data-coach],[data-toggle-achievements],[data-more-toggle],[data-more-close],[data-calcdist],[data-calc-equiv],[data-calc-hr],[data-create],[data-save],[data-close],[data-stop],[data-auth-submit],[data-auth-switch],[data-auth-reset],[data-logout],[data-track-start],[data-track-pause],[data-track-resume],[data-track-stop],[data-track-discard],[data-track-apply]");
    if(!t) return;
    if(t.hasAttribute("data-stop")) return;
    if(t.dataset.tab){ ui.tab=t.dataset.tab; ui.moreMenuOpen=false; render(); return; }
    if(t.dataset.moreToggle!==undefined){ ui.moreMenuOpen=!ui.moreMenuOpen; render(); return; }
    if(t.dataset.moreClose!==undefined){ ui.moreMenuOpen=false; render(); return; }
    if(t.dataset.week){ ui.viewWeek=parseInt(t.dataset.week); render(); return; }
    if(t.dataset.log){ ui.modal={week:ui.viewWeek,sessId:t.dataset.log,pace:null,rpe:null,note:null,repsDone:null}; render(); return; }
    if(t.dataset.gym){ toggleGym(ui.viewWeek,t.dataset.gym); return; }
    if(t.dataset.swap){
      if(t.disabled) return;
      swapSessions(ui.viewWeek, t.dataset.swap, parseInt(t.dataset.dir));
      return;
    }
    if(t.dataset.postpone){
      const sess=buildWeek(ui.viewWeek,state.profile.runDays,state.profile.gymDays,state.totalWeeks,state.event,state.goalPace).find(s=>s.id===t.dataset.postpone);
      if(sess) postponeSession(ui.viewWeek,sess);
      return;
    }
    if(t.dataset.delete){
      const sess=buildWeek(ui.viewWeek,state.profile.runDays,state.profile.gymDays,state.totalWeeks,state.event,state.goalPace).find(s=>s.id===t.dataset.delete);
      if(sess && confirm('¿Eliminar "'+sess.titulo+'" de esta semana? El resto del plan se recalcula sin esta sesión.')) deleteSession(ui.viewWeek,sess);
      return;
    }
    if(t.dataset.undoWeek!==undefined){
      const w=parseInt(t.dataset.undoWeek);
      const raw=buildWeekRaw(w, state.profile.runDays, state.totalWeeks, state.event, state.goalPace);
      const sess=raw.find(s=>s.id===t.dataset.undoId);
      if(sess) restoreSession(w, sess);
      return;
    }
    if(t.dataset.reset){ if(confirm("¿Seguro que quieres borrar el plan y empezar de cero?")) resetPlan(); return; }
    if(t.dataset.export){ exportData(t.dataset.export); return; }
    if(t.dataset.newplan!==undefined){ if(confirm("Esto archivará tu plan actual y empezarás uno nuevo desde cero. ¿Continuar?")) resetPlan(); return; }
    if(t.dataset.rpe){ syncModalInputs(); ui.modal.rpe=parseInt(t.dataset.rpe); render(); return; }
    if(t.dataset.reps){ syncModalInputs(); ui.modal.repsDone=parseInt(t.dataset.reps); render(); return; }
    if(t.dataset.close){ ui.modal=null; render(); return; }
    if(t.dataset.save){ const sess=buildWeek(ui.modal.week,state.profile.runDays,state.profile.gymDays,state.totalWeeks,state.event,state.goalPace).find(s=>s.id===ui.modal.sessId); logSession(ui.modal.week,sess,document.getElementById("m-pace").value,(ui.modal.rpe!=null?ui.modal.rpe:6),document.getElementById("m-note").value,ui.modal.repsDone); return; }
    if(t.dataset.trackStart){ startTracker(ui.modal.sessId, ui.modal.week); return; }
    if(t.dataset.trackPause){ pauseTracker(); return; }
    if(t.dataset.trackResume){ resumeTracker(); return; }
    if(t.dataset.trackStop){ stopTracker(); return; }
    if(t.dataset.trackDiscard){ if(confirm("¿Descartar esta grabación?")) discardTracker(); return; }
    if(t.dataset.trackApply){ applyTrackerToModal(); return; }
    if(t.dataset.sel){ syncObInputs(); const v=t.dataset.val; ui.ob[t.dataset.sel]=isNaN(v)?v:parseFloat(v); render(); return; }
    if(t.dataset.day!==undefined){
      syncObInputs();
      const d=parseInt(t.dataset.day);
      let days=(ui.ob.trainingDays||[]).slice();
      if(days.includes(d)){
        if(days.length>3) days=days.filter(x=>x!==d);
      } else {
        if(days.length<6) days.push(d);
      }
      // se mantienen en orden Lu..Do internamente
      ui.ob.trainingDays=WEEK_ORDER.filter(x=>days.includes(x));
      render(); return;
    }
    if(t.dataset.setday!==undefined){
      const d=parseInt(t.dataset.setday);
      let days=(state.profile.trainingDays||[]).slice();
      if(days.includes(d)){
        if(days.length<=3){ showToast("Necesitas al menos 3 días de entrenamiento.", true); return; }
        days=days.filter(x=>x!==d);
      } else {
        if(days.length>=6){ showToast("Como máximo 6 días de entrenamiento.", true); return; }
        days.push(d);
      }
      days=WEEK_ORDER.filter(x=>days.includes(x));
      const changedCount=days.length!==state.profile.runDays;
      state.profile.trainingDays=days;
      state.profile.runDays=days.length;
      save(); render();
      if(changedCount) showToast("Días actualizados. El número de sesiones por semana ha cambiado a "+days.length+".");
      return;
    }
    if(t.dataset.calmonth!==undefined){
      const delta=parseInt(t.dataset.calmonth);
      if(delta===0){ ui.calMonth=new Date(new Date().getFullYear(), new Date().getMonth(), 1); }
      else { const c=ui.calMonth||new Date(); ui.calMonth=new Date(c.getFullYear(), c.getMonth()+delta, 1); }
      render(); return;
    }
    if(t.dataset.coach){
      if(t.dataset.coach==="heavy") coachHeavyLegs();
      else if(t.dataset.coach==="missed") coachMissedYesterday();
      else if(t.dataset.coach==="great") coachFeelingGreat();
      return;
    }
    if(t.dataset.toggleAchievements!==undefined){
      ui.showAllAchievements=!ui.showAllAchievements;
      render(); return;
    }
    if(t.dataset.calcdist!==undefined){ syncCalcInputs(); ui.calc.dist=t.dataset.calcdist; render(); return; }
    if(t.dataset.calcEquiv!==undefined){ syncCalcInputs(); render(); return; }
    if(t.dataset.calcHr!==undefined){ syncCalcInputs(); render(); return; }
    if(t.dataset.create){ createPlan(); return; }
    if(t.hasAttribute("data-auth-switch")){ syncAuthInputs(); auth.form.mode=auth.form.mode==="login"?"register":"login"; render(); return; }
    if(t.hasAttribute("data-auth-submit")){ syncAuthInputs(); if(auth.form.mode==="login") doLogin(); else doRegister(); return; }
    if(t.hasAttribute("data-auth-reset")){ syncAuthInputs(); doResetPassword(); return; }
    if(t.hasAttribute("data-logout")){ if(confirm("¿Cerrar sesión?")) doLogout(); return; }
  };
}

/* ---------- arranque ---------- */
function loadLocalState(){
  const r=storage.get(STORAGE_KEY);
  if(r&&r.value){ try{ const s=JSON.parse(r.value); return s; }catch(e){ return null; } }
  return null;
}

// Realtime Database omite/convierte a null las propiedades vacías ({} o []),
// así que al recuperar el state hay que reponer los valores por defecto.
function normalizeState(s){
  if(!s) return s;
  if(!s.logs || typeof s.logs!=="object") s.logs={};
  if(!s.overrides || typeof s.overrides!=="object") s.overrides={};
  if(!Array.isArray(s.history)) s.history=[];
  if(!s.volumeAdj) s.volumeAdj={repsDelta:0,recoveryMult:1,reason:"hold"};
  if(!s.weekAdj) s.weekAdj={active:false,reason:null,since:null,postponedLong:false};
  if(typeof s.hardStreak!=="number") s.hardStreak=0;
  if(s.profile && (!Array.isArray(s.profile.trainingDays) || s.profile.trainingDays.length!==s.profile.runDays)){
    // genera un reparto por defecto: los primeros N días de WEEK_ORDER (Lu, Ma, Mi...)
    const n=clamp(s.profile.runDays||4,3,6);
    s.profile.trainingDays=WEEK_ORDER.slice(0,n);
  }
  // los arrays dentro de "incoming-N" en overrides también pueden venir como objeto si RTDB los reindexó
  for(const k in s.overrides){
    if(k.startsWith("incoming-") && s.overrides[k] && !Array.isArray(s.overrides[k])){
      s.overrides[k]=Object.values(s.overrides[k]);
    }
  }
  return s;
}

async function onUserSignedIn(user){
  auth.user=user;
  let s=null;
  try{
    s=await window.firebaseAPI.loadState(user.uid);
  }catch(e){
    showToast("No se pudo conectar con la nube. Usando los datos guardados en este dispositivo.", true);
  }
  if(!s) s=loadLocalState(); // primera vez en este dispositivo, o sin conexión: usa la copia local si existe
  s=normalizeState(s);
  if(s){
    state=s;
    ui.viewWeek=currentWeekOf(state.startDate,state.totalWeeks);
    storage.set(STORAGE_KEY, JSON.stringify(state)); // refresca la caché local
    // si el plan venía solo de localStorage (no existía aún en la nube), lo sube
    if(window.firebaseAPI) window.firebaseAPI.saveState(user.uid, state).catch(()=>{});
  } else {
    state=null; ui.ob=defaultOb();
  }
  ui.tab="resumen";
  render();
}
function onUserSignedOut(){
  auth.user=null; state=null; ui.ob=null;
  render();
}

function startAuthListener(){
  window.firebaseAPI.onAuthChange((user)=>{
    auth.ready=true;
    if(user) onUserSignedIn(user); else onUserSignedOut();
  });
}

(function init(){
  render(); // pantalla de carga mientras Firebase arranca
  if(window.__firebaseReady && window.firebaseAPI) startAuthListener();
  else window.addEventListener("firebase-ready", startAuthListener, {once:true});

  // registra el service worker (PWA instalable) si el navegador lo soporta y
  // estamos servidos por http(s). En file:// no se registra (no es compatible).
  if("serviceWorker" in navigator && location.protocol.startsWith("http")){
    window.addEventListener("load", ()=>{
      navigator.serviceWorker.register("sw.js").catch(()=>{});
    });
  }

  // salvaguarda: si Firebase no responde en unos segundos (p.ej. abierto como
  // archivo local file://, donde los módulos ES no cargan), avisa en vez de
  // dejar la pantalla de carga para siempre.
  setTimeout(()=>{
    if(!auth.ready){
      const root=document.getElementById("root");
      root.innerHTML='<div class="shell"><div class="loadingScreen">' +
        '<img class="logoOnboard" src="'+LOGO+'" alt="GOAT PACE">' +
        '<h1 class="onboardTitle" style="margin-top:18px">NO SE PUDO<br><span class="accent">CONECTAR</span></h1>' +
        '<p class="onboardSub">Esta app necesita cargarse desde una dirección <b>https://</b> (por ejemplo, tu enlace de GitHub Pages) para poder iniciar sesión. '+
        'Si la has abierto como archivo local o desde un adjunto, ábrela en su lugar desde ese enlace en el navegador.</p>' +
        '<button class="cta" style="max-width:240px" onclick="location.reload()">Reintentar</button>' +
      '</div></div>';
    }
  }, 6000);
})();
</script>
