<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Plan Media Maratón</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0F1525; --paper:#F6F2EA; --card:#FFFFFF; --accent:#FC5E15; --accent-dk:#D74A0C;
    --mut:#6B6456; --mut2:#9A927F; --line:#E7E0D2; --green:#3C9A4E; --gym:#C8901F;
    --sans:'Inter',system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;
    --mono:'SF Mono',ui-monospace,'Cascadia Mono',Menlo,monospace;
    --sh:0 1px 2px rgba(15,21,37,.05);
    --sh2:0 6px 20px rgba(15,21,37,.07);
    --r:14px;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--paper);color:var(--ink);font-family:var(--sans);font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased;}
  button{font-family:var(--sans);cursor:pointer;}
  input{font-family:var(--sans);}
  .shell{max-width:820px;margin:0 auto;padding:24px 18px 96px;min-height:100vh;}
  .eyebrow{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--mut);font-weight:600;margin-bottom:8px;}

  /* header */
  header{border-bottom:1px solid var(--line);padding-bottom:20px;margin-bottom:20px;}
  .logoWrap{text-align:center;margin:0 0 18px;}
  .logoOnboard{width:210px;max-width:66%;height:auto;}
  .logoHeader{height:64px;width:auto;display:block;flex:none;}
  .titleRow{display:flex;align-items:center;gap:14px;}
  .headerTop{display:flex;justify-content:space-between;align-items:center;gap:18px;flex-wrap:wrap;}
  .bigTitle{font-size:clamp(22px,3.4vw,28px);font-weight:800;letter-spacing:-.02em;line-height:1.1;}
  .accent{color:var(--accent);font-weight:800;}
  .unit{font-size:.5em;color:var(--mut);font-weight:600;}
  .bibBox{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:12px 18px;text-align:center;box-shadow:var(--sh);}
  .bibLabel{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--mut2);font-weight:600;}
  .bibPace{font-family:var(--mono);font-size:30px;font-weight:600;line-height:1.1;letter-spacing:-.02em;}
  .bibSub{font-size:12px;color:var(--mut);}
  .progressRow{margin-top:18px;}
  .progressTrack{position:relative;height:8px;background:#EBE4D6;border-radius:99px;overflow:hidden;}
  .progressFill{position:absolute;left:0;top:0;bottom:0;background:var(--accent);border-radius:99px;transition:width .5s ease;}
  .progressGoal{display:none;}
  .progressTxt{font-size:12px;color:var(--mut);margin-top:8px;}

  /* tabs */
  nav.tabs{display:flex;gap:8px;margin:20px 0 22px;flex-wrap:wrap;}
  .tab{border:1px solid var(--line);background:var(--card);color:var(--mut);padding:8px 16px;font-weight:600;font-size:13px;border-radius:99px;transition:all .15s;}
  .tab.on{background:var(--ink);color:#fff;border-color:var(--ink);}
  .tab:hover:not(.on){border-color:var(--mut2);color:var(--ink);}

  /* week nav */
  .weekNav{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:4px;}
  .navBtn{border:1px solid var(--line);background:var(--card);width:42px;height:42px;font-size:17px;border-radius:10px;color:var(--ink);transition:all .15s;}
  .navBtn:hover:not(:disabled){border-color:var(--mut2);}
  .navBtn:disabled{opacity:.35;cursor:default;}
  .weekNum{font-size:21px;font-weight:800;letter-spacing:-.01em;}
  .weekOf{color:var(--mut2);font-weight:600;font-size:15px;}
  .weekPhase{font-size:12px;letter-spacing:.04em;color:var(--accent);text-transform:uppercase;font-weight:600;margin-top:2px;}
  .todayBtn{border:none;background:transparent;font-size:13px;color:var(--mut);text-decoration:underline;margin:6px auto 0;display:block;}

  /* session cards */
  .sessionList{display:flex;flex-direction:column;gap:12px;margin-top:16px;}
  .card{display:flex;gap:16px;background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:18px;align-items:center;flex-wrap:wrap;box-shadow:var(--sh);}
  .card.race{background:var(--ink);color:#fff;border-color:var(--ink);}
  .card.gym{border-left:4px solid var(--gym);}
  .card.done{border-left:4px solid var(--green);}
  .cardLane{font-size:15px;font-weight:700;width:30px;height:30px;flex:none;display:flex;align-items:center;justify-content:center;border-radius:8px;background:var(--paper);color:var(--mut);}
  .card.race .cardLane{background:rgba(255,255,255,.14);color:var(--accent);}
  .card.gym .cardLane{color:var(--gym);}
  .cardBody{flex:1 1 220px;min-width:200px;}
  .cardType{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);font-weight:700;}
  .card.gym .cardType{color:var(--gym);}
  .cardTitle{font-size:17px;font-weight:700;margin:4px 0 4px;letter-spacing:-.01em;}
  .cardDetail{font-size:13.5px;line-height:1.5;color:var(--mut);}
  .card.race .cardDetail{color:#C9CCD6;}
  .logLine{font-size:12.5px;color:var(--green);margin-top:8px;font-weight:500;}
  .card.race .logLine{color:#7BE3B0;}
  .cardRight{text-align:right;display:flex;flex-direction:column;justify-content:center;gap:3px;min-width:120px;}
  .cardPace{font-family:var(--mono);font-size:24px;font-weight:600;line-height:1;letter-spacing:-.02em;}
  .cardPaceLbl{font-size:10.5px;color:var(--mut2);}
  .card.race .cardPaceLbl{color:#9AA0B0;}
  .logBtn{margin-top:8px;border:1px solid var(--line);background:var(--card);color:var(--ink);padding:7px 12px;font-weight:600;font-size:12px;border-radius:8px;transition:all .15s;}
  .logBtn:hover{border-color:var(--ink);}
  .card.race .logBtn{background:transparent;border-color:rgba(255,255,255,.3);color:#fff;}
  .card.race .logBtn:hover{background:#fff;color:var(--ink);}

  /* paces grid */
  .paceGrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:12px;}
  .paceCard{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:16px 18px;box-shadow:var(--sh);}
  .paceCardLbl{font-size:11px;letter-spacing:.04em;text-transform:uppercase;color:var(--mut);font-weight:600;}
  .paceCardVal{font-family:var(--mono);font-size:27px;font-weight:600;margin-top:6px;letter-spacing:-.02em;}
  .paceCardUnit{font-size:13px;color:var(--mut2);font-weight:400;font-family:var(--sans);}
  .note{grid-column:1/-1;font-size:13px;color:var(--mut);line-height:1.55;margin-top:10px;}

  /* progress */
  .statRow{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:18px;}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:14px 16px;box-shadow:var(--sh);}
  .statLbl{font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--mut);font-weight:600;}
  .statVal{font-family:var(--mono);font-size:26px;font-weight:600;margin-top:6px;letter-spacing:-.02em;}
  .statUnit{font-size:13px;color:var(--mut2);font-weight:400;margin-left:4px;font-family:var(--sans);}
  .chartBox{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:18px;box-shadow:var(--sh);}
  .banner{margin-top:16px;padding:14px 18px;background:#EAF5EC;color:#1E6B36;font-weight:500;font-size:14px;border-radius:var(--r);border:1px solid #CDE7D3;}
  .banner.warn{background:#FCEDE6;color:#B23D14;border-color:#F4D2C2;}

  /* settings */
  .settingsRow{display:flex;justify-content:space-between;gap:12px;padding:13px 0;border-bottom:1px solid var(--line);font-size:14px;}
  .settingsRow b{font-weight:600;}
  .settingsHd{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--accent);font-weight:700;margin:22px 0 6px;}
  .settingsHd:first-child{margin-top:4px;}
  .dangerBtn{margin-top:26px;border:1px solid var(--accent);background:transparent;color:var(--accent-dk);padding:11px 18px;font-weight:600;font-size:14px;border-radius:10px;transition:all .15s;}
  .dangerBtn:hover{background:var(--accent);color:#fff;}

  /* onboarding */
  .onboard{max-width:540px;margin:4vh auto 0;}
  .onboardTitle{font-size:clamp(24px,4vw,32px);font-weight:800;line-height:1.1;letter-spacing:-.02em;margin:2px 0 12px;}
  .onboardSub{font-size:15px;line-height:1.6;color:var(--mut);margin-bottom:20px;}
  .formCard{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:24px;box-shadow:var(--sh2);}
  .fgHd{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--mut);font-weight:700;margin:22px 0 10px;padding-bottom:8px;border-bottom:1px solid var(--line);}
  .fgHd:first-child{margin-top:0;}
  .lbl{display:block;font-size:12px;color:var(--mut);font-weight:600;margin:13px 0 6px;}
  .selRow{display:flex;gap:8px;flex-wrap:wrap;}
  .selBtn{flex:1;min-width:46px;border:1px solid var(--line);background:var(--card);color:var(--ink);padding:11px 0;font-weight:600;font-size:15px;border-radius:10px;transition:all .15s;}
  .selBtn.on{background:var(--ink);color:#fff;border-color:var(--ink);}
  .selBtn:hover:not(.on){border-color:var(--mut2);}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  .grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}
  input.field{width:100%;border:1px solid var(--line);border-radius:10px;padding:12px 14px;font-size:16px;font-weight:500;background:var(--card);color:var(--ink);transition:border-color .15s;}
  input.field::placeholder{color:var(--mut2);font-weight:400;}
  .fieldUnit{position:relative;}
  .fieldUnit span{position:absolute;right:14px;top:50%;transform:translateY(-50%);font-size:12px;color:var(--mut2);pointer-events:none;}
  .cta{width:100%;margin-top:24px;border:none;background:var(--accent);color:#fff;padding:14px 0;font-weight:700;font-size:16px;border-radius:10px;transition:background .15s;}
  .cta:hover{background:var(--accent-dk);}

  /* modal */
  .overlay{position:fixed;inset:0;background:rgba(15,21,37,.45);display:flex;align-items:center;justify-content:center;padding:16px;z-index:50;backdrop-filter:blur(2px);}
  .modal{background:var(--card);border-radius:18px;padding:24px;width:100%;max-width:440px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 50px rgba(15,21,37,.25);}
  .modalTitle{margin:6px 0 6px;font-size:21px;font-weight:700;letter-spacing:-.01em;}
  .modalTarget{font-size:13.5px;color:var(--mut);margin-bottom:6px;}
  .rpeRow{display:grid;grid-template-columns:repeat(10,1fr);gap:5px;}
  .rpeBtn{border:1px solid var(--line);background:var(--card);color:var(--ink);padding:9px 0;font-weight:600;font-size:13px;border-radius:8px;transition:all .12s;}
  .rpeBtn.on{background:var(--accent);border-color:var(--accent);color:#fff;}
  .rpeHint{font-size:12px;color:var(--mut);margin-top:7px;}
  .modalBtns{display:flex;gap:10px;margin-top:22px;}
  .ghostBtn{border:1px solid var(--line);background:var(--card);color:var(--ink);padding:12px 18px;font-weight:600;font-size:14px;border-radius:10px;}
  .ghostBtn:hover{border-color:var(--ink);}

  /* toast */
  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:13px 22px;font-size:14px;font-weight:500;max-width:90vw;z-index:60;border-radius:12px;box-shadow:0 10px 30px rgba(15,21,37,.3);}
  .toast.err{background:var(--accent-dk);}

  input:focus,button:focus-visible{outline:2px solid var(--accent);outline-offset:1px;}
  input.field:focus{border-color:var(--accent);outline:none;}
  @media (prefers-reduced-motion:reduce){*{transition:none!important;}}

  /* ============ RESPONSIVE MÓVIL ============ */
  @media (max-width:640px){
    .shell{padding:14px 12px 90px;}
    .logoHeader{height:46px;}
    .titleRow{gap:10px;}
    .bigTitle{font-size:19px;line-height:1.25;}
    .eyebrow{font-size:10px;margin-bottom:4px;}
    .headerTop{align-items:flex-start;gap:12px;}
    .bibBox{padding:9px 14px;}
    .bibPace{font-size:24px;}
    .bibSub{font-size:11px;}

    nav.tabs{gap:6px;}
    .tab{padding:7px 12px;font-size:12px;}

    .weekNum{font-size:18px;}
    .navBtn{width:38px;height:38px;font-size:15px;}

    .card{padding:14px;gap:12px;}
    .cardTitle{font-size:15.5px;}
    .cardDetail{font-size:13px;}
    .cardPace{font-size:21px;}
    .cardRight{min-width:0;flex:1 1 100%;flex-direction:row;align-items:center;justify-content:space-between;text-align:left;margin-top:4px;}
    .cardRight .cardPaceLbl{order:2;}
    .logBtn{margin-top:0;}
    .cardBody{flex:1 1 100%;}
    .cardLane{width:26px;height:26px;font-size:13px;}

    .paceGrid{grid-template-columns:repeat(2,1fr);}
    .paceCardVal{font-size:22px;}

    .statRow{grid-template-columns:repeat(2,1fr);}
    .statVal{font-size:21px;}
    .statRow .stat:last-child{grid-column:1/-1;}

    .formCard{padding:18px;border-radius:14px;}
    .grid3{grid-template-columns:1fr 1fr 1fr;gap:8px;}
    .grid2{grid-template-columns:1fr;gap:10px;}
    input.field{font-size:16px;padding:11px 12px;}
    .onboardTitle{font-size:24px;}
    .onboardSub{font-size:14px;}
    .logoOnboard{width:160px;}

    .modal{padding:18px;border-radius:14px;}
    .rpeRow{gap:4px;}
    .rpeBtn{font-size:12px;padding:8px 0;}
    .modalBtns{flex-direction:column-reverse;}
    .modalBtns .cta,.modalBtns .ghostBtn{width:100%;}

    .settingsRow{font-size:13px;}
  }
  @media (max-width:380px){
    .grid3{grid-template-columns:1fr 1fr 1fr;gap:6px;}
    .fieldUnit span{font-size:10px;right:10px;}
    input.field{padding:10px 10px;font-size:15px;}
    .cardPace{font-size:19px;}
    .logoHeader{height:38px;}
  }
</style>
</head>

/* ---------- almacenamiento ---------- */
const _mem = {};
const storage = {
  get(k){ try{ const v=localStorage.getItem(k); return v==null?(k in _mem?{value:_mem[k]}:null):{value:v}; }catch(e){ return k in _mem?{value:_mem[k]}:null; } },
  set(k,v){ try{ localStorage.setItem(k,v); }catch(e){ _mem[k]=v; } },
  del(k){ try{ localStorage.removeItem(k); }catch(e){} delete _mem[k]; }
};

/* ---------- utilidades ---------- */
const fmtPace = (s)=>{ if(!s||!isFinite(s)) return "–:––"; const m=Math.floor(s/60),ss=Math.round(s%60); return m+":"+String(ss).padStart(2,"0"); };
const fmtTime = (t)=>{ const h=Math.floor(t/3600),m=Math.floor((t%3600)/60),s=Math.round(t%60); return h>0?h+":"+String(m).padStart(2,"0")+":"+String(s).padStart(2,"0"):m+":"+String(s).padStart(2,"0"); };
const parsePace = (str)=>{ const m=String(str).trim().match(/^(\d{1,2})[:.,'](\d{1,2})$/); if(!m) return null; const sec=parseInt(m[1])*60+parseInt(m[2]); return sec>=140&&sec<=600?sec:null; };
const clamp = (x,a,b)=>Math.min(Math.max(x,a),b);
const esc = (s)=>String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));

});

  w<=16 ? {n:2,name:"Construcción"} :
  w<=24 ? {n:3,name:"Específico I"} :
  w<=31 ? {n:4,name:"Específico II"} :
          {n:5,name:"Puesta a punto"};

const S = (id,tipo,titulo,detalle,paceKey,quality=false,gym=false)=>({id,tipo,titulo,detalle,paceKey,quality,gym});

/* sesiones de carrera base (estructura de 5: s1..s5) */
function runSessions(w, goalHM){
  const rec=isRecovery(w), ph=phaseOf(w).n;
  const r=(x)=>rec?Math.round(x*0.7):x;

  if(ph===1){
    const fart=Math.min(8+w,14);
    let s1;
    if(rec) s1=S("s1","FARTLEK","Fartlek "+(fart-4)+"×1′/1′","Calidad ligera en descarga. Tramos a sensación de 5K, recuperación al trote.","short",true);
    else if(w%2===1){ const reps=Math.min(3+Math.floor(w/2),6); s1=S("s1","TEMPO",reps+"×1000 m en umbral","Intervalos de umbral (cruise): «cómodamente duro», recuperación 75″. Calienta 15′.","tempo",true); }
    else { const reps=Math.min(6+w,12); s1=S("s1","SERIES",reps+"×400 m","Series cortas a ritmo 5K para meter velocidad pronto. Recuperación 60″. Calienta 15′.","short",true); }
    return [
      s1,
      S("s2","RODAJE","Rodaje suave "+r(40)+"′","Recuperación activa, muy cómodo.","easy"),
      S("s3","FARTLEK","Fartlek "+(rec?fart-4:fart)+"×1′/1′","Segundo estímulo: tramos rápidos a sensación de 5K, recuperación al trote. Calienta y enfría 15′.","short",true),
      S("s4","RODAJE","Rodaje medio "+r(50+w)+"′","Ritmo cómodo-estable + 4 rectas.","easy"),
      S("s5","LARGA","Tirada larga "+r(70+w*3)+"′", w>=5?"Progresiva: 10–15′ a ritmo de umbral en la segunda mitad.":"Progresiva: el último cuarto algo más vivo, por debajo del umbral.","long"),
    ];
  }
  if(ph===2){
    const reps=rec?5:Math.min(6+Math.floor((w-9)/2),9), tempo=rec?15:Math.min(20+(w-9)*2,32);
    return [
      S("s1","SERIES",reps+"×800 m","Recuperación 90″ al trote. Calentamiento 20′ con rectas.","vo2",true),
      S("s2","RODAJE","Rodaje suave "+r(45)+"′","Recuperación activa.","easy"),
      S("s3","TEMPO","Tempo "+tempo+"′ continuo","Ritmo de umbral, «cómodamente duro». Calienta y enfría 15′.","tempo",true),
      S("s4","RODAJE","Rodaje suave "+r(40)+"′","Muy fácil + 4 rectas.","easy"),
      S("s5","LARGA","Tirada larga "+r(85+(w-9)*3)+"′","Los últimos 15–20′ a ritmo de rodaje activo.","long"),
    ];
  }
  if(ph===3){
    const reps=rec?4:Math.min(5+Math.floor((w-17)/3),7);
    return [
      S("s1","SERIES",reps+"×1000 m","Recuperación 2′ al trote. Busca regularidad entre repeticiones.","vo2",true),
      S("s2","RODAJE","Rodaje suave "+r(45)+"′","Recuperación activa.","easy"),
      S("s3","TEMPO","2×"+(rec?12:15)+"′ umbral","Recuperación 3′ al trote entre bloques.","tempo",true),
      S("s4","RODAJE","Rodaje suave "+r(40)+"′","Muy fácil + 4 rectas.","easy"),
      S("s5","LARGA","Tirada larga "+r(100+(w-17)*2)+"′","Incluye "+(rec?20:25+(w-17))+"′ a ritmo de competición en la segunda mitad.","long"),
    ];
  }
  if(ph===4){
    const kmRace=rec?6:Math.min(8+Math.floor((w-25)/2),12);
    return [
      S("s1","SERIES","3×2000 m","Ligeramente más rápido que ritmo de competición. Recuperación 2′30″.","race",true),
      S("s2","RODAJE","Rodaje suave "+r(45)+"′","Recuperación activa.","easy"),
      S("s3","RITMO",kmRace+" km a ritmo competición","Sesión clave: simula el esfuerzo de carrera. Calienta 15′.","race",true),
      S("s4","RODAJE","Rodaje suave "+r(40)+"′","Muy fácil + 4 rectas.","easy"),
      S("s5","LARGA","Tirada larga "+r(110)+"′","Con "+(rec?30:40)+"′ a ritmo de competición repartidos en bloques.","long"),
    ];
  }
  if(w===32) return [
    S("s1","SERIES","5×1000 m","A ritmo de competición exacto. Recuperación 2′.","race",true),
    S("s2","RODAJE","Rodaje suave 40′","Fácil.","easy"),
    S("s3","TEMPO","Tempo 15′","Último estímulo de umbral.","tempo",true),
    S("s4","RODAJE","Rodaje suave 35′","Fácil + 4 rectas.","easy"),
    S("s5","LARGA","Tirada 75′","Con 20′ a ritmo de competición.","long"),
  ];
  if(w===33) return [
    S("s1","SERIES","4×800 m","A ritmo de competición, sensaciones frescas.","race",true),
    S("s2","RODAJE","Rodaje suave 35′","Fácil.","easy"),
    S("s3","RITMO","3 km a ritmo competición","Corto y controlado.","race",true),
    S("s4","RODAJE","Rodaje suave 30′","Fácil.","easy"),
    S("s5","LARGA","Tirada 60′","Toda suave.","long"),
  ];
  // semana de carrera (34)
  return [
    S("s1","RODAJE","Rodaje suave 30′","Fácil + 4 rectas.","easy"),
    S("s2","ACTIVACIÓN","20′ + 4×200 m","Activación a ritmo de competición. Dos días antes de la carrera.","race"),
    S("s3","RODAJE","Rodaje suave 20′","Víspera: soltar piernas, opcional.","easy"),
    S("s4","CARRERA","MEDIA MARATÓN · 21,1 km","Sal conservador los primeros 3 km (+3–5 s/km) y aprieta del 15 en adelante. ¡A por el "+fmtTime(goalHM*21.0975)+"!","race",true),
  ];
}

/* sesiones de gimnasio según fase */
function gymSessions(w, gymDays){
  if(gymDays<=0) return [];
  const ph=phaseOf(w).n;
  let count=gymDays, pool;
  if(ph>=5){ count=Math.min(gymDays,1); pool=[
    ["Movilidad y activación","Movilidad de cadera y tobillo, activación de glúteo y core suave. Nada pesado en taper."]
  ]; }
  else if(ph<=2){ pool=[
    ["Fuerza general A","Sentadilla, peso muerto rumano, zancadas y plancha. 3–4×8–10. Técnica sobre carga."],
    ["Fuerza general B","Sentadilla búlgara, puente de glúteo, gemelo y core anti-rotación. 3×10."],
    ["Core y estabilidad","Core, estabilidad de cadera y propiocepción a una pierna. 3 vueltas."]
  ]; }
  else if(ph===3){ pool=[
    ["Fuerza + pliometría A","Sentadilla pesada 4×5, saltos al cajón 4×5 y core. Descansos completos."],
    ["Fuerza + pliometría B","Peso muerto 4×5, multisaltos, zancada con salto y core."],
    ["Pliometría ligera","Comba, skipping, tobillo reactivo y movilidad. Calidad de impacto."]
  ]; }
  else { pool=[
    ["Mantenimiento de fuerza A","Cargas moderadas explosivas 3×5, skipping y core. Mantener, no fatigar."],
    ["Mantenimiento de fuerza B","Fuerza ligera, pliometría corta y movilidad. Piernas frescas."],
    ["Core y movilidad","Core, estabilidad de cadera y movilidad. Sesión de soporte."]
  ]; }
  const out=[];
  for(let i=0;i<count;i++){ const it=pool[i%pool.length]; out.push(S("g"+(i+1),"GIMNASIO",it[0],it[1],null,false,true)); }
  return out;
}

/* selección de la semana según días de carrera + añade gimnasio */
function buildWeek(w, runDays, gymDays, goalHM){
  let runs=runSessions(w, goalHM);
  if(w!==34){
    const byId={}; runs.forEach(s=>byId[s.id]=s);
    let chosen;
    if(runDays<=3) chosen=["s1","s3","s5"];
    else if(runDays===4) chosen=["s1","s3","s4","s5"];
    else chosen=["s1","s2","s3","s4","s5"];
    runs=chosen.map(id=>byId[id]).filter(Boolean);
    if(runDays>=6) runs.splice(runs.length-1,0,S("s6","RODAJE","Rodaje suave 35′","Día extra de volumen aeróbico, muy suave.","easy"));
  }
  return runs.concat(gymSessions(w, gymDays));
}

/* ---------- lógica adaptativa ---------- */
function adaptFitness(fitness, prescribed, actual, rpe, initialPace, goalHM){
  const delta=prescribed-actual;
  let adj=Math.max(-5,Math.min(4,delta*0.35));
  if(rpe>=9) adj=Math.min(adj,0)-1.5;
  else if(rpe>=8&&adj>0) adj*=0.4;
  else if(rpe<=4&&delta>=-2) adj+=1;
  const next=fitness-adj;
  return { next: clamp(next, goalHM-6, initialPace+20), adj };
}

/* ============================================================
   ESTADO + RENDER
   ============================================================ */
let state=null;
const ui={ tab:"semana", viewWeek:1, modal:null, ob:null };
let toastTimer=null;

function defaultOb(){ return { runDays:4, gymDays:2, age:"", height:"", weight:"", c10:"", cHM:"", t10:"", tHM:"" }; }
function currentWeekOf(sd){ const d=Math.floor((Date.now()-new Date(sd).getTime())/86400000); return Math.min(Math.max(Math.floor(d/7)+1,1),TOTAL_WEEKS); }
function save(){ storage.set(STORAGE_KEY, JSON.stringify(state)); }

function showToast(msg, err=false){
  let t=document.getElementById("toast");
  if(!t){ t=document.createElement("div"); t.id="toast"; document.body.appendChild(t); }
  t.className="toast"+(err?" err":""); t.textContent=msg;
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>{ if(t) t.remove(); },4600);
}

/* ---------- crear plan desde el onboarding ---------- */
function createPlan(){
  syncObInputs();
  const o=ui.ob;
  const age=parseInt(o.age), height=parseInt(o.height), weight=parseFloat(String(o.weight).replace(",","."));
  if(!(age>=12&&age<=90)){ showToast("Revisa la edad (años).", true); return; }
  if(!(height>=120&&height<=220)){ showToast("Revisa la altura (cm).", true); return; }
  if(!(weight>=30&&weight<=180)){ showToast("Revisa el peso (kg).", true); return; }
  const c10=parsePace(o.c10), cHM=parsePace(o.cHM), t10=parsePace(o.t10), tHM=parsePace(o.tHM);
  if(!c10){ showToast("Ritmo actual de 10K no válido (m:ss).", true); return; }
  if(!cHM){ showToast("Ritmo actual de media no válido (m:ss).", true); return; }
  if(!t10){ showToast("Ritmo objetivo de 10K no válido (m:ss).", true); return; }
  if(!tHM){ showToast("Ritmo objetivo de media no válido (m:ss).", true); return; }
  if(cHM<=c10){ showToast("Tu media no puede ir más rápida que tu 10K. Revisa los ritmos actuales.", true); return; }
  if(tHM<=t10){ showToast("El objetivo de media no puede ir más rápido que el de 10K.", true); return; }
  if(tHM>=cHM){ showToast("El objetivo de media debe ser más rápido que tu marca actual.", true); return; }

  const gap=clamp(cHM-c10,6,30);
  state={
    startDate:new Date().toISOString(),
    profile:{runDays:o.runDays, gymDays:o.gymDays, age, height, weight},
    current10k:c10, currentHM:cHM, target10k:t10, goalHM:tHM, gap,
    initialPace:cHM, fitnessPace:cHM,
    history:[{date:new Date().toISOString(), pace:cHM, note:"Punto de partida"}],
    logs:{}, hardStreak:0,
  };
  save(); ui.viewWeek=1; ui.tab="semana"; ui.ob=null;
  render();
  showToast("Plan creado. Objetivo media "+fmtPace(tHM)+" /km ("+fmtTime(tHM*21.0975)+").");
}

function logSession(weekN, sess, paceStr, rpe, note){
  const actual=parsePace(paceStr);
  if(!actual){ showToast("Ritmo no válido. Formato m:ss, p. ej. 3:52.", true); return; }
  const f=state.fitnessPace;
  const prescribed=paces(f,state.gap)[sess.paceKey].v;
  const key="w"+weekN+"-"+sess.id;
  state.logs[key]={pace:actual,rpe,note,date:new Date().toISOString()};
  let msg;
  if(sess.quality){
    const {next,adj}=adaptFitness(f,prescribed,actual,rpe,state.initialPace,state.goalHM);
    state.fitnessPace=Math.round(next*10)/10;
    state.history.push({date:new Date().toISOString(),pace:state.fitnessPace});
    state.hardStreak=rpe>=9?state.hardStreak+1:0;
    if(adj>0.5) msg="Buen trabajo: ritmos ajustados "+Math.abs(adj).toFixed(1)+" s/km más rápidos.";
    else if(adj<-0.5) msg="Sesión exigente: ritmos suavizados "+Math.abs(adj).toFixed(1)+" s/km para asimilar la carga.";
    else msg="Sesión en el clavo. Ritmos sin cambios.";
    if(state.hardStreak>=3) msg+=" ⚠ Llevas 3 sesiones al límite: prioriza descanso.";
  } else {
    state.hardStreak=rpe>=9?state.hardStreak+1:state.hardStreak;
    msg=rpe>=8?"Registrado. Un rodaje suave no debería costar tanto: vigila la fatiga.":"Registrado. Los rodajes suaves no modifican los ritmos.";
  }
  save(); ui.modal=null; render(); showToast(msg);
}

function toggleGym(weekN, sessId){
  const key="w"+weekN+"-"+sessId;
  if(state.logs[key]) delete state.logs[key]; else state.logs[key]={done:true,date:new Date().toISOString()};
  save(); render();
}

function resetPlan(){ storage.del(STORAGE_KEY); state=null; ui.tab="semana"; ui.modal=null; ui.ob=defaultOb(); render(); }

/* ---------- render ---------- */
function render(){
  const root=document.getElementById("root");
  if(state===null){ if(!ui.ob) ui.ob=defaultOb(); root.innerHTML=onboardHTML(); wire(); return; }

  const f=state.fitnessPace, P=paces(f,state.gap);
  const curWeek=currentWeekOf(state.startDate);
  const progress=Math.min(100,Math.max(0,Math.round(((state.initialPace-f)/Math.max(state.initialPace-state.goalHM,1))*100)));
  const raceDate=new Date(new Date(state.startDate).getTime()+(TOTAL_WEEKS-1)*7*86400000);

  let body="";
  if(ui.tab==="semana")   body=weekTabHTML(P,curWeek);
  if(ui.tab==="progreso") body=progressTabHTML();
  if(ui.tab==="volumen")  body=volumeTabHTML();
  if(ui.tab==="ritmos")   body=pacesTabHTML(P);
  if(ui.tab==="ajustes")  body=settingsTabHTML();

  root.innerHTML=
    '<div class="shell">' +
      '<header>' +
      '<div class="headerTop">' +
        '<div class="titleRow"><img class="logoHeader" src="'+LOGO+'" alt="GOAT PACE">' +
        '<div><div class="eyebrow">PLAN 34 SEMANAS · MEDIA MARATÓN</div>' +
        '<div class="bigTitle">OBJETIVO <span class="accent">'+fmtPace(state.goalHM)+'</span><span class="unit">/km</span></div></div></div>' +
        '<div class="bibBox"><div class="bibLabel">RITMO ACTUAL</div><div class="bibPace">'+fmtPace(f)+'</div>' +
        '<div class="bibSub">≈ '+fmtTime(f*21.0975)+' en meta</div></div>' +
      '</div>' +
      '<div class="progressRow"><div class="progressTrack"><div class="progressFill" style="width:'+progress+'%"></div><div class="progressGoal"></div></div>' +
      '<div class="progressTxt">'+progress+'% hacia '+fmtPace(state.goalHM)+' · carrera ≈ '+raceDate.toLocaleDateString("es-ES",{day:"numeric",month:"short",year:"numeric"})+'</div></div></header>' +
      '<nav class="tabs">'+tabBtn("semana","Entrenamientos")+tabBtn("progreso","Progreso")+tabBtn("volumen","Volumen")+tabBtn("ritmos","Mis ritmos")+tabBtn("ajustes","Ajustes")+'</nav>' +
      '<main>'+body+'</main>' +
    '</div>' +
    (ui.modal?modalHTML(P):"");
  wire();
}

const tabBtn=(k,l)=>'<button class="tab'+(ui.tab===k?" on":"")+'" data-tab="'+k+'">'+l+'</button>';

function weekTabHTML(P, curWeek){
  const w=ui.viewWeek;
  const sessions=buildWeek(w, state.profile.runDays, state.profile.gymDays, state.goalHM);
  const ph=phaseOf(w);
  let html='<div class="weekNav">' +
    '<button class="navBtn" data-week="'+(w-1)+'"'+(w<=1?" disabled":"")+'>←</button>' +
    '<div style="text-align:center"><div class="weekNum">SEMANA '+w+'<span class="weekOf">/'+TOTAL_WEEKS+'</span></div>' +
    '<div class="weekPhase">'+ph.name+(isRecovery(w)?" · descarga":"")+(w===curWeek?" · esta semana":"")+'</div></div>' +
    '<button class="navBtn" data-week="'+(w+1)+'"'+(w>=TOTAL_WEEKS?" disabled":"")+'>→</button></div>';
  if(w!==curWeek) html+='<button class="todayBtn" data-week="'+curWeek+'">Ir a la semana actual ('+curWeek+')</button>';
  html+='<div class="sessionList">';
  let runIdx=0;
  sessions.forEach(sess=>{
    const log=state.logs["w"+w+"-"+sess.id];
    const isRace=sess.tipo==="CARRERA";
    if(sess.gym){
      html+='<div class="card gym'+(log?" done":"")+'">' +
        '<div class="cardLane">⊕</div>' +
        '<div class="cardBody"><div class="cardType">'+sess.tipo+'</div>' +
        '<div class="cardTitle">'+esc(sess.titulo)+'</div><div class="cardDetail">'+esc(sess.detalle)+'</div>' +
        (log?'<div class="logLine">✓ Hecho</div>':'')+'</div>' +
        '<div class="cardRight"><div class="cardPaceLbl">sesión de fuerza</div>' +
        '<button class="logBtn" data-gym="'+sess.id+'">'+(log?"Hecho ✓":"Marcar hecho")+'</button></div></div>';
    } else {
      runIdx++;
      const p=P[sess.paceKey];
      html+='<div class="card'+(isRace?" race":"")+(log?" done":"")+'">' +
        '<div class="cardLane">'+(isRace?"★":runIdx)+'</div>' +
        '<div class="cardBody"><div class="cardType">'+sess.tipo+(sess.quality&&!isRace?" · CALIDAD":"")+'</div>' +
        '<div class="cardTitle">'+esc(sess.titulo)+'</div><div class="cardDetail">'+esc(sess.detalle)+'</div>' +
        (log?'<div class="logLine">✓ Hecho a <b>'+fmtPace(log.pace)+'</b> /km · RPE '+log.rpe+(log.note?" · "+esc(log.note):"")+'</div>':'')+'</div>' +
        '<div class="cardRight"><div class="cardPace">'+fmtPace(p.v)+'</div><div class="cardPaceLbl">/km · '+p.label.toLowerCase()+'</div>' +
        '<button class="logBtn" data-log="'+sess.id+'">'+(log?"Editar marca":"Registrar marca")+'</button></div></div>';
    }
  });
  html+='</div>';
  return html;
}

function pacesTabHTML(P){

function progressTabHTML(){
  const h=state.history, W=640,H=240,pad=36;
  const maxP=Math.max(...h.map(d=>d.pace), state.initialPace)+6, minP=state.goalHM-6;
  const x=(i)=>pad+(i/Math.max(h.length-1,1))*(W-pad*2);
  const y=(p)=>pad+((p-minP)/(maxP-minP))*(H-pad*2);
  const path=h.map((d,i)=>(i?"L":"M")+x(i)+","+y(d.pace)).join(" ");
  const cur=state.fitnessPace, gap=cur-state.goalHM, quality=Object.values(state.logs).filter(l=>l.pace).length;
  const stat=(l,v,u,good)=>'<div class="stat"><div class="statLbl">'+l+'</div><div class="statVal"'+(good?' style="color:#3C9A4E"':"")+'>'+v+'<span class="statUnit">'+u+'</span></div></div>';
  let dots=h.map((d,i)=>'<circle cx="'+x(i)+'" cy="'+y(d.pace)+'" r="4" fill="#0F1525"/>').join("");
  if(h.length>0) dots+='<circle cx="'+x(h.length-1)+'" cy="'+y(h[h.length-1].pace)+'" r="6" fill="#FC5E15"/>';
  let html='<div class="statRow">'+stat("Ritmo estimado hoy",fmtPace(cur),"/km",false)+stat("Te faltan",gap<=0?"0":Math.round(gap),"s/km",gap<=3)+stat("Sesiones de calidad",quality,"",false)+'</div>' +
    '<div class="chartBox"><svg viewBox="0 0 '+W+' '+H+'" style="width:100%;height:auto;display:block">' +
    '<line x1="'+pad+'" x2="'+(W-pad)+'" y1="'+y(state.goalHM)+'" y2="'+y(state.goalHM)+'" stroke="#FC5E15" stroke-dasharray="6 5" stroke-width="2"/>' +
    '<text x="'+(W-pad)+'" y="'+(y(state.goalHM)-7)+'" text-anchor="end" font-size="12" fill="#FC5E15" font-weight="700" font-family="ui-monospace,monospace">OBJETIVO '+fmtPace(state.goalHM)+'</text>' +
    '<line x1="'+pad+'" x2="'+(W-pad)+'" y1="'+y(state.initialPace)+'" y2="'+y(state.initialPace)+'" stroke="#D8CDB8" stroke-width="1"/>' +
    '<text x="'+pad+'" y="'+(y(state.initialPace)-7)+'" font-size="11" fill="#6B6456" font-family="ui-monospace,monospace">salida '+fmtPace(state.initialPace)+'</text>' +
    '<path d="'+path+'" fill="none" stroke="#0F1525" stroke-width="2.5" stroke-linejoin="round"/>'+dots+'</svg>' +
    '<div class="note">Cada punto es un recálculo de tu ritmo tras una sesión de calidad.</div></div>';
  if(gap<=0) html+='<div class="banner">🏁 Tu forma actual ya está en ritmo objetivo. Consolida y no fuerces de más.</div>';
  if(state.hardStreak>=3) html+='<div class="banner warn">⚠ Varias sesiones seguidas al límite. Mete una semana suave: el progreso llega asimilando, no acumulando fatiga.</div>';
  return html;
}

/* ---------- estimación de volumen / carga ---------- */
function estMinutes(sess, P){
  const t=sess.titulo, tipo=sess.tipo;
  const num=(re,d)=>{ const m=t.match(re); return m?parseInt(m[1]):d; };
  if(sess.gym) return 0;
  if(tipo==='RODAJE'||tipo==='LARGA') return num(/(\d+)′/,40);
  if(tipo==='ACTIVACIÓN') return 30;
  if(tipo==='CARRERA') return Math.round(21.0975*(P.race.v/60));
  if(tipo==='RITMO'){ const k=num(/(\d+)\s*km/,8); return Math.round(k*(P.race.v/60)+20); }
  if(tipo==='TEMPO'){
    if(/continuo/.test(t)) return num(/(\d+)′/,20)+30;
    let m=t.match(/(\d+)×(\d+)′/); if(m){ const r=+m[1],e=+m[2]; return r*e+(r-1)*3+30; }
    m=t.match(/(\d+)×(\d+)\s*m/); if(m){ const r=+m[1],d=+m[2]/1000; return Math.round(r*d*(P.tempo.v/60)+(r-1)*1.25+30); }
    return num(/(\d+)′/,20)+30;
  }
  if(tipo==='SERIES'||tipo==='FARTLEK'){
    let m=t.match(/(\d+)×(\d+)′\/(\d+)′/); if(m){ const r=+m[1]; return r*(+m[2]+ +m[3])+30; }
    m=t.match(/(\d+)×(\d+)\s*m/); if(m){ const r=+m[1],d=+m[2]/1000; const pace=P[sess.paceKey].v/60; const rec=d<=0.5?1:d<=1?1.5:2.5; return Math.round(r*d*pace+(r-1)*rec+30); }
    return 50;
  }
  return num(/(\d+)′/,45);
}
function weekVolume(w,P){
  const ss=buildWeek(w,state.profile.runDays,state.profile.gymDays,state.goalHM);
  let easy=0,qual=0,gym=0;
  ss.forEach(s=>{ if(s.gym){gym++;return;} const m=estMinutes(s,P); if(s.quality)qual+=m; else easy+=m; });
  return {easy,qual,total:easy+qual,gym};
}
function volumeTabHTML(){
  const P=paces(state.fitnessPace,state.gap);
  const curWeek=currentWeekOf(state.startDate);
  const arr=[]; for(let w=1;w<=TOTAL_WEEKS;w++) arr.push(weekVolume(w,P));
  const cur=arr[curWeek-1];
  let peakI=0; arr.forEach((a,i)=>{ if(a.total>arr[peakI].total) peakI=i; });
  const totalPlan=arr.reduce((s,a)=>s+a.total,0);
  const fmtH=(m)=>{ const h=Math.floor(m/60),mm=Math.round(m%60); return h>0?(h+" h"+(mm?" "+mm+"′":"")):(mm+"′"); };
  const qShare=cur.total?Math.round(cur.qual/cur.total*100):0;
  const stat=(l,v,u)=>'<div class="stat"><div class="statLbl">'+l+'</div><div class="statVal">'+v+'<span class="statUnit">'+u+'</span></div></div>';

  const W=700,H=250,padL=30,padR=12,padT=18,padB=28;
  const n=TOTAL_WEEKS, step=(W-padL-padR)/n, barW=step*0.62, y0=H-padB, top=padT;
  const maxT=Math.max(...arr.map(a=>a.total),1), sc=(y0-top)/maxT;
  let g="", bars="", lab="";
  [8,16,24,31].forEach(b=>{ const x=(padL+b*step).toFixed(1); g+='<line x1="'+x+'" x2="'+x+'" y1="'+top+'" y2="'+y0+'" stroke="#EBE4D6" stroke-width="1"/>'; });
  g+='<line x1="'+padL+'" x2="'+(W-padR)+'" y1="'+y0+'" y2="'+y0+'" stroke="#D8CDB8" stroke-width="1"/>';
  arr.forEach((a,i)=>{
    const w=i+1, x=padL+i*step+(step-barW)/2, eH=a.easy*sc, qH=a.qual*sc;
    bars+='<rect x="'+x.toFixed(1)+'" y="'+(y0-eH).toFixed(1)+'" width="'+barW.toFixed(1)+'" height="'+eH.toFixed(1)+'" fill="#E2D8C4" rx="1.5"/>';
    bars+='<rect x="'+x.toFixed(1)+'" y="'+(y0-eH-qH).toFixed(1)+'" width="'+barW.toFixed(1)+'" height="'+Math.max(qH,0).toFixed(1)+'" fill="#FC5E15" rx="1.5"/>';
    if(w===curWeek){ bars+='<rect x="'+(x-2).toFixed(1)+'" y="'+(y0-eH-qH-4).toFixed(1)+'" width="'+(barW+4).toFixed(1)+'" height="'+(eH+qH+4).toFixed(1)+'" fill="none" stroke="#0F1525" stroke-width="1.5" rx="3"/>'; lab+='<text x="'+(x+barW/2).toFixed(1)+'" y="'+(y0-eH-qH-9).toFixed(1)+'" text-anchor="middle" font-size="10" fill="#0F1525" font-weight="700">hoy</text>'; }
  });
  [1,8,16,24,31,34].forEach(w=>{ const x=(padL+(w-1)*step+step/2).toFixed(1); lab+='<text x="'+x+'" y="'+(H-8)+'" text-anchor="middle" font-size="10" fill="#9A927F">'+w+'</text>'; });

  return '<div class="statRow">'+
      stat("Esta semana (sem. "+curWeek+")", fmtH(cur.total), "")+
      stat("De ello, calidad", qShare, "%")+
      stat("Semana pico", "S"+(peakI+1), "· "+fmtH(arr[peakI].total))+
    '</div>'+
    '<div class="chartBox"><svg viewBox="0 0 '+W+' '+H+'" style="width:100%;height:auto;display:block">'+g+bars+lab+'</svg>'+
    '<div style="display:flex;gap:18px;align-items:center;flex-wrap:wrap;margin-top:14px;font-size:12.5px;color:var(--mut)">'+
      '<span style="display:inline-flex;align-items:center;gap:7px"><span style="width:12px;height:12px;background:#E2D8C4;border-radius:3px"></span>Rodaje y tirada larga</span>'+
      '<span style="display:inline-flex;align-items:center;gap:7px"><span style="width:12px;height:12px;background:#FC5E15;border-radius:3px"></span>Calidad (series, tempo, ritmo)</span>'+
    '</div>'+
    '<div class="note">Volumen estimado como tiempo en carrera por semana, según tus '+state.profile.runDays+' días de carrera. Las semanas más bajas son de descarga (una de cada cuatro) y la caída final es la puesta a punto. El plan suma unas '+fmtH(totalPlan)+' de carrera'+(cur.gym?('. Esta semana añades '+cur.gym+' sesión'+(cur.gym>1?'es':'')+' de fuerza'):'')+'.</div>'+
    '</div>';
}

  const existing=state.logs["w"+w+"-"+sess.id];
  const prescribed=P[sess.paceKey].v;
  const rpe=ui.modal.rpe!=null?ui.modal.rpe:(existing?existing.rpe:6);
  const paceVal=ui.modal.pace!=null?ui.modal.pace:(existing?fmtPace(existing.pace):"");
  const noteVal=ui.modal.note!=null?ui.modal.note:(existing?(existing.note||""):"");
  const hint=rpe<=4?"Muy cómodo":rpe<=6?"Controlado":rpe<=8?"Exigente":"Al límite";
  let rpeBtns=""; for(let i=1;i<=10;i++) rpeBtns+='<button class="rpeBtn'+(rpe===i?" on":"")+'" data-rpe="'+i+'">'+i+'</button>';
  return '<div class="overlay" data-close="1"><div class="modal" data-stop="1">' +
    '<div class="cardType">SEMANA '+w+' · '+sess.tipo+'</div><h3 class="modalTitle">'+esc(sess.titulo)+'</h3>' +

}

/* ---------- sincronizar inputs antes de re-render ---------- */
function syncObInputs(){
  if(!ui.ob) return;
  const g=(id)=>{ const el=document.getElementById(id); return el?el.value:undefined; };
  const map={age:"ob-age",height:"ob-height",weight:"ob-weight",c10:"ob-c10",cHM:"ob-cHM",t10:"ob-t10",tHM:"ob-tHM"};
  for(const k in map){ const v=g(map[k]); if(v!==undefined) ui.ob[k]=v; }
}
function syncModalInputs(){
  if(!ui.modal) return;
  const p=document.getElementById("m-pace"), n=document.getElementById("m-note");
  if(p) ui.modal.pace=p.value; if(n) ui.modal.note=n.value;
}

/* ---------- eventos ---------- */
function wire(){
  const root=document.getElementById("root");
  root.onclick=(e)=>{
    const t=e.target.closest("[data-tab],[data-week],[data-log],[data-gym],[data-reset],[data-rpe],[data-sel],[data-create],[data-save],[data-close],[data-stop]");
    if(!t) return;
    if(t.hasAttribute("data-stop")) return;
    if(t.dataset.tab){ ui.tab=t.dataset.tab; render(); return; }
    if(t.dataset.week){ ui.viewWeek=parseInt(t.dataset.week); render(); return; }
    if(t.dataset.log){ ui.modal={week:ui.viewWeek,sessId:t.dataset.log,pace:null,rpe:null,note:null}; render(); return; }
    if(t.dataset.gym){ toggleGym(ui.viewWeek,t.dataset.gym); return; }
    if(t.dataset.reset){ if(confirm("¿Seguro que quieres borrar el plan y empezar de cero?")) resetPlan(); return; }
    if(t.dataset.rpe){ syncModalInputs(); ui.modal.rpe=parseInt(t.dataset.rpe); render(); return; }
    if(t.dataset.close){ ui.modal=null; render(); return; }
    if(t.dataset.save){ const sess=buildWeek(ui.modal.week,state.profile.runDays,state.profile.gymDays,state.goalHM).find(s=>s.id===ui.modal.sessId); logSession(ui.modal.week,sess,document.getElementById("m-pace").value,(ui.modal.rpe!=null?ui.modal.rpe:6),document.getElementById("m-note").value); return; }
    if(t.dataset.sel){ syncObInputs(); const v=t.dataset.val; ui.ob[t.dataset.sel]=isNaN(v)?v:parseFloat(v); render(); return; }
    if(t.dataset.create){ createPlan(); return; }
  };
}

/* ---------- arranque ---------- */
(function init(){
  const r=storage.get(STORAGE_KEY);
  if(r&&r.value){ try{ state=JSON.parse(r.value); ui.viewWeek=currentWeekOf(state.startDate); }catch(e){ state=null; } }
  if(state===null) ui.ob=defaultOb();
  render();
})();
</script>
