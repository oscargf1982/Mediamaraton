<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Plan Media Maratón</title>
<link rel="manifest" href="manifest.webmanifest" />
<meta name="theme-color" content="#FC5E15" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="GOAT PACE" />
<link rel="apple-touch-icon" href="icon-192.png" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0F1525; --paper:#F6F2EA; --card:#FFFFFF; --accent:#FC5E15; --accent-dk:#D74A0C;
    --mut:#6B6456; --mut2:#9A927F; --line:#E7E0D2; --green:#3C9A4E; --gym:#C8901F;
    --sans:'Inter',system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;
    --mono:'SF Mono',ui-monospace,'Cascadia Mono',Menlo,monospace;
    --sh:0 1px 2px rgba(15,21,37,.05);
    --sh2:0 6px 20px rgba(15,21,37,.07);
    --r:14px;
    /* escala tipográfica: 5 tamaños */
    --fs-xs:12px; --fs-sm:14px; --fs-md:16px; --fs-lg:20px; --fs-xl:28px;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--paper);color:var(--ink);font-family:var(--sans);font-size:var(--fs-md);line-height:1.5;-webkit-font-smoothing:antialiased;}
  button{font-family:var(--sans);cursor:pointer;}
  input{font-family:var(--sans);}
  .shell{max-width:820px;margin:0 auto;padding:24px 18px 96px;min-height:100vh;}
  .eyebrow{font-size:var(--fs-xs);letter-spacing:.1em;text-transform:uppercase;color:var(--mut);font-weight:600;margin-bottom:8px;}

  /* header */
  header{border-bottom:1px solid var(--line);padding-bottom:20px;margin-bottom:20px;}
  .logoWrap{text-align:center;margin:0 0 18px;}
  .logoOnboard{width:210px;max-width:66%;height:auto;}
  .logoHeader{height:64px;width:auto;display:block;flex:none;}
  .titleRow{display:flex;align-items:center;gap:14px;}
  .headerTop{display:flex;justify-content:space-between;align-items:center;gap:18px;flex-wrap:wrap;}
  .bigTitle{font-size:clamp(22px,3.4vw,28px);font-weight:800;letter-spacing:-.02em;line-height:1.1;}
  .accent{color:var(--accent);font-weight:800;}
  .unit{font-size:.5em;color:var(--mut);font-weight:600;}
  .bibBox{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:12px 18px;text-align:center;box-shadow:var(--sh);}
  .logoutIcon{border:1px solid var(--line);background:var(--card);color:var(--mut);width:42px;height:42px;border-radius:10px;font-size:18px;flex:none;transition:all .15s;}
  .logoutIcon:hover{border-color:var(--accent-dk);color:var(--accent-dk);}
  .bibLabel{font-size:var(--fs-xs);letter-spacing:.1em;text-transform:uppercase;color:var(--mut2);font-weight:600;}
  .bibPace{font-family:var(--mono);font-size:var(--fs-xl);font-weight:600;line-height:1.1;letter-spacing:-.02em;}
  .bibSub{font-size:var(--fs-xs);color:var(--mut);}
  .progressRow{margin-top:18px;}
  .progressTrack{position:relative;height:8px;background:#EBE4D6;border-radius:99px;overflow:hidden;}
  .progressFill{position:absolute;left:0;top:0;bottom:0;background:var(--accent);border-radius:99px;transition:width .5s ease;}
  .progressGoal{display:none;}
  .progressTxt{font-size:var(--fs-xs);color:var(--mut);margin-top:8px;}

  /* tabs */
  nav.tabs{display:flex;gap:8px;margin:20px 0 22px;flex-wrap:wrap;}
  .tab{border:1px solid var(--line);background:var(--card);color:var(--mut);padding:8px 16px;font-weight:600;font-size:var(--fs-sm);border-radius:99px;transition:all .15s;}
  .tab.on{background:var(--ink);color:#fff;border-color:var(--ink);}
  .tab:hover:not(.on){border-color:var(--mut2);color:var(--ink);}

  /* week nav */
  .weekNav{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:4px;}
  .navBtn{border:1px solid var(--line);background:var(--card);width:42px;height:42px;font-size:var(--fs-lg);border-radius:10px;color:var(--ink);transition:all .15s;}
  .navBtn:hover:not(:disabled){border-color:var(--mut2);}
  .navBtn:disabled{opacity:.35;cursor:default;}
  .weekNum{font-size:var(--fs-lg);font-weight:800;letter-spacing:-.01em;}
  .weekOf{color:var(--mut2);font-weight:600;font-size:var(--fs-md);}
  .weekPhase{font-size:var(--fs-xs);letter-spacing:.04em;color:var(--accent);text-transform:uppercase;font-weight:600;margin-top:2px;}
  .todayBtn{border:none;background:transparent;font-size:var(--fs-sm);color:var(--mut);text-decoration:underline;margin:6px auto 0;display:block;}

  /* session cards — rediseño tipo app premium: vertical, sin bordes, con aire */
  .sessionList{display:flex;flex-direction:column;gap:14px;margin-top:18px;}
  .card{display:flex;flex-direction:column;gap:14px;background:var(--card);border:none;border-radius:18px;padding:22px 24px;box-shadow:var(--sh2);}
  .card.race{background:var(--ink);color:#fff;}
  .card.gym{box-shadow:var(--sh2),inset 4px 0 0 var(--gym);}
  .card.done{box-shadow:var(--sh2),inset 4px 0 0 var(--green);}
  .card.ghostCard{background:transparent;box-shadow:none;border:1px dashed var(--line);padding:14px 18px;gap:8px;}
  .card.ghostCard .cardType{color:var(--mut2);}
  .cardHead{display:flex;align-items:center;gap:10px;}
  .cardIcon{font-size:var(--fs-lg);line-height:1;flex:none;}
  .cardType{font-size:var(--fs-xs);letter-spacing:.12em;text-transform:uppercase;color:var(--accent);font-weight:700;}
  .card.gym .cardType{color:var(--gym);}
  .card.race .cardType{color:var(--accent);}
  .cardTitle{font-size:var(--fs-xl);font-weight:800;letter-spacing:-.01em;line-height:1.15;}
  .cardDetail{font-size:var(--fs-md);line-height:1.6;color:var(--mut);}
  .card.race .cardDetail{color:#C9CCD6;}
  .logLine{font-size:var(--fs-sm);color:var(--green);font-weight:600;display:flex;align-items:center;gap:6px;}
  .card.race .logLine{color:#7BE3B0;}
  /* fila de stat-chips: Objetivo / RPE / Duración */
  .statChips{display:flex;gap:28px;flex-wrap:wrap;padding-top:4px;}
  .statChip{display:flex;flex-direction:column;gap:2px;}
  .statChipLbl{font-size:var(--fs-xs);letter-spacing:.1em;text-transform:uppercase;color:var(--mut2);font-weight:600;}
  .card.race .statChipLbl{color:#9AA0B0;}
  .statChipVal{font-family:var(--mono);font-size:var(--fs-xl);font-weight:600;letter-spacing:-.02em;line-height:1.1;}
  .statChipUnit{font-size:var(--fs-sm);color:var(--mut2);font-weight:400;font-family:var(--sans);margin-left:2px;}
  .card.race .statChipUnit{color:#9AA0B0;}
  .cardFoot{display:flex;justify-content:flex-end;gap:8px;flex-wrap:wrap;}
  .ghostBtn.small{padding:9px 14px;font-size:var(--fs-xs);border-radius:99px;border:1px solid var(--line);background:transparent;color:var(--mut);}
  .ghostBtn.small.reorderBtn{padding:9px 11px;font-size:11px;}
  .ghostBtn.small.reorderBtn:disabled{opacity:.3;cursor:default;}
  .ghostBtn.small.reorderBtn:disabled:hover{border-color:var(--line);color:var(--mut);}
  .card.race .ghostBtn.small{border-color:rgba(255,255,255,.25);color:#C9CCD6;}
  .ghostBtn.small:hover{border-color:var(--ink);color:var(--ink);}
  .card.race .ghostBtn.small:hover{border-color:#fff;color:#fff;}
  .ghostBtn.small.danger:hover{border-color:var(--accent-dk);color:var(--accent-dk);background:#FCEDE6;}
  .postponedTag{font-size:var(--fs-xs);font-weight:600;color:var(--accent);background:#FDE9DD;display:inline-block;padding:5px 12px;border-radius:99px;align-self:flex-start;}
  .card.race .postponedTag{background:rgba(252,94,21,.18);color:#FFB088;}
  .recoveryTag{font-size:var(--fs-sm);color:var(--mut2);}
  .card.race .recoveryTag{color:#9AA0B0;}
  /* desglose de bloques (warmup/work/cooldown) */
  .blockRow{display:flex;gap:8px;flex-wrap:wrap;}
  .blockChip{font-size:var(--fs-xs);font-weight:600;padding:6px 12px;border-radius:99px;}
  .blockWU{background:var(--paper);color:var(--mut);}
  .card.race .blockWU{background:rgba(255,255,255,.10);color:#C9CCD6;}
  .blockWork{background:#FDE9DD;color:var(--accent-dk);}
  .card.race .blockWork{background:rgba(252,94,21,.18);color:#FFB088;}
  .logBtn{border:none;background:var(--paper);color:var(--ink);padding:11px 20px;font-weight:700;font-size:var(--fs-sm);border-radius:99px;transition:all .15s;}
  .logBtn:hover{background:var(--accent);color:#fff;}
  .card.race .logBtn{background:rgba(255,255,255,.12);color:#fff;}
  .card.race .logBtn:hover{background:#fff;color:var(--ink);}
  .card.done .logBtn{background:transparent;color:var(--green);box-shadow:inset 0 0 0 1.5px var(--green);}
  .card.done .logBtn:hover{background:var(--green);color:#fff;}

  /* paces grid */
  .paceGrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:12px;}
  .paceCard{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:16px 18px;box-shadow:var(--sh);}
  .paceCardLbl{font-size:var(--fs-xs);letter-spacing:.04em;text-transform:uppercase;color:var(--mut);font-weight:600;}
  .paceCardVal{font-family:var(--mono);font-size:var(--fs-xl);font-weight:600;margin-top:6px;letter-spacing:-.02em;}
  .paceCardUnit{font-size:var(--fs-sm);color:var(--mut2);font-weight:400;font-family:var(--sans);}
  .note{grid-column:1/-1;font-size:var(--fs-sm);color:var(--mut);line-height:1.55;margin-top:10px;}

  /* progress */
  .statRow{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:18px;}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:14px 16px;box-shadow:var(--sh);}
  .statLbl{font-size:var(--fs-xs);letter-spacing:.06em;text-transform:uppercase;color:var(--mut);font-weight:600;}
  .statVal{font-family:var(--mono);font-size:var(--fs-xl);font-weight:600;margin-top:6px;letter-spacing:-.02em;}
  .statUnit{font-size:var(--fs-sm);color:var(--mut2);font-weight:400;margin-left:4px;font-family:var(--sans);}
  .chartBox{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:18px;box-shadow:var(--sh);}
  .banner{margin-top:16px;padding:14px 18px;background:#EAF5EC;color:#1E6B36;font-weight:500;font-size:var(--fs-sm);border-radius:var(--r);border:1px solid #CDE7D3;}
  .banner.warn{background:#FCEDE6;color:#B23D14;border-color:#F4D2C2;}

  /* ============ CALENDARIO ============ */
  .calNav{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
  .calTitle{font-size:var(--fs-lg);font-weight:800;letter-spacing:.04em;}
  .navBtn{border:1px solid var(--line);background:var(--card);color:var(--ink);width:38px;height:38px;border-radius:10px;font-size:var(--fs-md);}
  .navBtn:hover{border-color:var(--ink);}
  .todayBtn{border:1px solid var(--line);background:var(--card);color:var(--mut);padding:8px 14px;border-radius:99px;font-size:var(--fs-xs);font-weight:600;margin-bottom:12px;}
  .todayBtn:hover{border-color:var(--ink);color:var(--ink);}
  .calGrid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;}
  .calDow{text-align:center;font-size:var(--fs-xs);font-weight:700;color:var(--mut2);letter-spacing:.08em;padding-bottom:4px;}
  .calCell{background:var(--card);border-radius:10px;padding:6px;min-height:78px;box-shadow:var(--sh);display:flex;flex-direction:column;gap:3px;}
  .calCell.calOut{opacity:.35;}
  .calCell.calNoplan{background:transparent;box-shadow:none;}
  .calCell.calToday{box-shadow:var(--sh),inset 0 0 0 2px var(--accent);}
  .calDayNum{font-size:var(--fs-xs);font-weight:700;color:var(--mut2);}
  .calPill{font-size:10px;line-height:1.3;font-weight:600;color:#fff;background:var(--pillColor);border-radius:5px;padding:2px 5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .calPill.calDone{opacity:.55;text-decoration:line-through;}
  .calPill.calRace{font-weight:800;}
  .calLegend{display:flex;gap:14px;flex-wrap:wrap;margin-top:14px;font-size:var(--fs-xs);color:var(--mut);}
  .calLegendItem{display:flex;align-items:center;gap:5px;}
  .calDot{width:9px;height:9px;border-radius:3px;display:inline-block;}

  /* ============ DASHBOARD / RESUMEN ============ */
  .coachFeed{display:flex;flex-direction:column;gap:8px;margin-bottom:14px;}
  .feedItem{display:flex;gap:10px;align-items:flex-start;background:var(--card);border-radius:12px;padding:11px 14px;box-shadow:var(--sh);}
  .feedIcon{font-size:18px;line-height:1.4;flex:none;}
  .feedText{font-size:var(--fs-sm);color:var(--ink);line-height:1.45;}
  .feedItem.feed-warn{box-shadow:var(--sh),inset 4px 0 0 var(--accent);}
  .feedItem.feed-good{box-shadow:var(--sh),inset 4px 0 0 var(--green);}
  .feedItem.feed-info{box-shadow:var(--sh),inset 4px 0 0 var(--mut2);}

  .todayCard{background:var(--ink);color:#fff;border-radius:18px;padding:22px 24px;margin-bottom:16px;box-shadow:var(--sh2);}
  .todayCard.todayRace{background:var(--accent);}
  .todayLbl{font-size:var(--fs-xs);letter-spacing:.14em;font-weight:700;color:var(--accent);}
  .todayCard.todayRace .todayLbl{color:#fff;}
  .todayTitle{font-size:var(--fs-xl);font-weight:800;letter-spacing:-.01em;margin:4px 0 4px;}
  .todayDetail{font-size:var(--fs-md);color:#C9CCD6;line-height:1.5;}
  .todayCard.todayRace .todayDetail{color:#FFE4D6;}
  .todayMetaRow{display:flex;gap:20px;flex-wrap:wrap;margin-top:14px;font-size:var(--fs-sm);color:#C9CCD6;}
  .todayCard.todayRace .todayMetaRow{color:#FFE4D6;}
  .todayMetaRow b{font-family:var(--mono);font-size:var(--fs-lg);color:#fff;}

  .bottomNav{display:none;}
  .moreMenuOverlay{display:none;}
  @media (max-width:640px){
    .bottomNav{
      display:flex; position:fixed; left:0; right:0; bottom:0; z-index:40;
      background:var(--card); border-top:1px solid var(--line);
      padding:6px 4px env(safe-area-inset-bottom,6px);
      box-shadow:0 -2px 12px rgba(0,0,0,.06);
    }
    .bnItem{flex:1; display:flex; flex-direction:column; align-items:center; gap:2px; padding:6px 0; color:var(--mut2); border:none; background:transparent; border-radius:10px;}
    .bnItem.on{color:var(--accent-dk); background:#FDE9DD;}
    .bnIcon{font-size:20px; line-height:1;}
    .bnLabel{font-size:10px; font-weight:700;}
    .moreMenuOverlay{display:flex; position:fixed; inset:0; background:rgba(15,21,37,.35); z-index:50; align-items:flex-end; justify-content:center;}
    .moreMenu{background:var(--card); border-radius:18px 18px 0 0; width:100%; max-width:480px; padding:10px; padding-bottom:calc(78px + env(safe-area-inset-bottom,0px)); display:flex; flex-direction:column; gap:4px;}
    .moreMenuItem{text-align:left; padding:14px 16px; border-radius:12px; border:none; background:transparent; font-size:var(--fs-md); font-weight:700; color:var(--ink);}
    .moreMenuItem.on{background:#FDE9DD; color:var(--accent-dk);}
  }

  .coachRow{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:20px;}
  .coachLbl{font-size:var(--fs-sm);color:var(--mut);font-weight:600;margin-right:4px;}
  .coachBtn{border:1px solid var(--line);background:var(--card);color:var(--ink);padding:9px 16px;border-radius:99px;font-size:var(--fs-sm);font-weight:600;box-shadow:var(--sh);transition:all .15s;}
  .coachBtn:hover{border-color:var(--accent);color:var(--accent-dk);}

  .achSection{margin-bottom:20px;}
  .achHeader{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px;}
  .achTitle{font-size:var(--fs-md);font-weight:800;}
  .achCount{font-size:var(--fs-sm);color:var(--mut);font-family:var(--mono);}
  .achGrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px;}
  .achCard{background:var(--card);border-radius:14px;box-shadow:var(--sh);padding:12px 14px;display:flex;gap:10px;opacity:.55;}
  .achCard.achDone{opacity:1;box-shadow:var(--sh2),inset 4px 0 0 var(--accent);}
  .achIcon{font-size:24px;flex:none;line-height:1;}
  .achBody{min-width:0;}
  .achCardTitle{font-size:var(--fs-sm);font-weight:700;}
  .achDesc{font-size:var(--fs-xs);color:var(--mut);line-height:1.35;margin-top:2px;}
  .achBar{height:5px;background:var(--paper);border-radius:99px;margin-top:8px;overflow:hidden;}
  .achBarFill{height:100%;background:var(--accent);border-radius:99px;}
  .achValue{font-size:var(--fs-xs);font-weight:700;color:var(--accent-dk);font-family:var(--mono);margin-top:6px;}
  .dashGrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:20px;}
  .statWide{grid-column:1/-1;}
  .statAccent{background:var(--ink);color:#fff;}
  .statAccent .statLbl{color:#C9CCD6;}
  .statAccent .statExtra{color:#C9CCD6;}
  .statExtra{font-size:var(--fs-sm);color:var(--mut);margin-top:6px;line-height:1.4;}
  .statExtra.good{color:var(--green);font-weight:600;}
  .statExtra.warn{color:var(--accent-dk);font-weight:600;}
  .statWarnBorder{box-shadow:var(--sh),inset 0 0 0 2px #F4D2C2;}

  .dashSection{margin-bottom:20px;}
  .predGrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:12px;margin-top:10px;}
  .predCard{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:14px 16px;text-align:center;box-shadow:var(--sh);}
  .predCard.predCurrent{background:var(--ink);color:#fff;border-color:var(--ink);}
  .predLbl{font-size:var(--fs-xs);letter-spacing:.08em;text-transform:uppercase;color:var(--mut);font-weight:600;}
  .predCurrent .predLbl{color:#C9CCD6;}
  .predVal{font-family:var(--mono);font-size:var(--fs-lg);font-weight:600;margin-top:4px;}
  .predTag{font-size:var(--fs-xs);color:var(--accent);font-weight:700;margin-top:2px;text-transform:uppercase;letter-spacing:.06em;}
  .predCurrent .predTag{color:#FFB088;}

  .recentList{display:flex;flex-direction:column;gap:10px;margin-top:10px;}
  .recentRow{display:flex;justify-content:space-between;align-items:center;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px 16px;box-shadow:var(--sh);}
  .recentRow b{font-size:var(--fs-sm);}
  .recentDate{font-size:var(--fs-xs);color:var(--mut2);margin-left:8px;}
  .recentPace{font-family:var(--mono);font-size:var(--fs-md);font-weight:600;}
  .recentRpe{font-size:var(--fs-sm);color:var(--mut);}

  /* settings */
  .settingsRow{display:flex;justify-content:space-between;gap:12px;padding:13px 0;border-bottom:1px solid var(--line);font-size:var(--fs-sm);}
  .settingsRow b{font-weight:600;}
  .settingsHd{font-size:var(--fs-xs);letter-spacing:.08em;text-transform:uppercase;color:var(--accent);font-weight:700;margin:22px 0 6px;}
  .settingsHd:first-child{margin-top:4px;}
  .dangerBtn{margin-top:26px;border:1px solid var(--accent);background:transparent;color:var(--accent-dk);padding:11px 18px;font-weight:600;font-size:var(--fs-sm);border-radius:10px;transition:all .15s;}
  .dangerBtn:hover{background:var(--accent);color:#fff;}

  /* onboarding */
  .onboard{max-width:540px;margin:4vh auto 0;}
  .loadingScreen{min-height:80vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;}
  .onboardTitle{font-size:clamp(24px,4vw,32px);font-weight:800;line-height:1.1;letter-spacing:-.02em;margin:2px 0 12px;}
  .onboardSub{font-size:var(--fs-md);line-height:1.6;color:var(--mut);margin-bottom:20px;}
  .formCard{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:24px;box-shadow:var(--sh2);}
  .fgHd{font-size:var(--fs-xs);letter-spacing:.08em;text-transform:uppercase;color:var(--mut);font-weight:700;margin:22px 0 10px;padding-bottom:8px;border-bottom:1px solid var(--line);}
  .fgHd:first-child{margin-top:0;}
  .lbl{display:block;font-size:var(--fs-xs);color:var(--mut);font-weight:600;margin:13px 0 6px;}
  .selRow{display:flex;gap:8px;flex-wrap:wrap;}
  .selBtn{flex:1;min-width:46px;border:1px solid var(--line);background:var(--card);color:var(--ink);padding:11px 0;font-weight:600;font-size:var(--fs-md);border-radius:10px;transition:all .15s;}
  .selBtn.on{background:var(--ink);color:#fff;border-color:var(--ink);}
  .selBtn:hover:not(.on){border-color:var(--mut2);}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  .grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}
  input.field{width:100%;border:1px solid var(--line);border-radius:10px;padding:12px 14px;font-size:var(--fs-md);font-weight:500;background:var(--card);color:var(--ink);transition:border-color .15s;}
  input.field::placeholder{color:var(--mut2);font-weight:400;}
  .fieldUnit{position:relative;}
  .fieldUnit span{position:absolute;right:14px;top:50%;transform:translateY(-50%);font-size:var(--fs-xs);color:var(--mut2);pointer-events:none;}
  .cta{width:100%;margin-top:24px;border:none;background:var(--accent);color:#fff;padding:14px 0;font-weight:700;font-size:var(--fs-md);border-radius:10px;transition:background .15s;}
  .cta:hover{background:var(--accent-dk);}

  /* modal */
  .overlay{position:fixed;inset:0;background:rgba(15,21,37,.45);display:flex;align-items:center;justify-content:center;padding:16px;z-index:50;backdrop-filter:blur(2px);}
  .modal{background:var(--card);border-radius:18px;padding:24px;width:100%;max-width:440px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 50px rgba(15,21,37,.25);}
  .modalTitle{margin:6px 0 6px;font-size:var(--fs-lg);font-weight:700;letter-spacing:-.01em;}
  .modalTarget{font-size:var(--fs-sm);color:var(--mut);margin-bottom:6px;}
  .trackerModal{text-align:center;}
  .trackerClock{font-family:var(--mono);font-size:56px;font-weight:700;letter-spacing:-.02em;margin:14px 0;}
  .trackerBadge{display:inline-block;background:var(--paper);color:var(--mut);font-size:var(--fs-xs);font-weight:700;padding:5px 14px;border-radius:99px;margin-bottom:10px;}
  .trackerBadge.wlOk{background:#E7F4EC;color:var(--green);}
  .trackerStats{justify-content:center;gap:28px;margin-bottom:14px;}
  .trackerStats .statChip{align-items:center;}
  .trackerWarn{font-size:var(--fs-sm);color:var(--accent-dk);background:#FCEDE6;border-radius:10px;padding:8px 12px;margin-bottom:10px;}
  .trackerNote{font-size:var(--fs-xs);color:var(--mut2);margin:6px 0 14px;line-height:1.4;}
  .rpeRow{display:grid;grid-template-columns:repeat(10,1fr);gap:5px;}
  .rpeBtn{border:1px solid var(--line);background:var(--card);color:var(--ink);padding:9px 0;font-weight:600;font-size:var(--fs-sm);border-radius:8px;transition:all .12s;}
  .rpeBtn.on{background:var(--accent);border-color:var(--accent);color:#fff;}
  .rpeHint{font-size:var(--fs-xs);color:var(--mut);margin-top:7px;}
  .modalBtns{display:flex;gap:10px;margin-top:22px;}
  .ghostBtn{border:1px solid var(--line);background:var(--card);color:var(--ink);padding:12px 18px;font-weight:600;font-size:var(--fs-sm);border-radius:10px;}
  .ghostBtn:hover{border-color:var(--ink);}

  /* toast */
  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:13px 22px;font-size:var(--fs-sm);font-weight:500;max-width:90vw;z-index:60;border-radius:12px;box-shadow:0 10px 30px rgba(15,21,37,.3);}
  .toast.err{background:var(--accent-dk);}

  input:focus,button:focus-visible{outline:2px solid var(--accent);outline-offset:1px;}
  input.field:focus{border-color:var(--accent);outline:none;}
  @media (prefers-reduced-motion:reduce){*{transition:none!important;}}

  /* ============ RESPONSIVE MÓVIL ============ */
  @media (max-width:640px){
    .tabs{display:none;}
    .calCell{min-height:56px;padding:4px;}
    .calPill{font-size:9px;padding:1px 3px;}
    .calDayNum{font-size:10px;}
    .calTitle{font-size:var(--fs-md);}
    .shell{padding:14px 12px 90px;}
    .logoHeader{height:46px;}
    .titleRow{gap:10px;}
    .bigTitle{font-size:var(--fs-lg);line-height:1.25;}
    .eyebrow{font-size:var(--fs-xs);margin-bottom:4px;}
    .headerTop{align-items:flex-start;gap:12px;}
    .bibBox{padding:9px 14px;}
    .logoutIcon{width:38px;height:38px;font-size:16px;}
    .bibPace{font-size:var(--fs-xl);}
    .bibSub{font-size:var(--fs-xs);}

    nav.tabs{gap:6px;}
    .tab{padding:7px 12px;font-size:var(--fs-xs);}

    .weekNum{font-size:var(--fs-lg);}
    .navBtn{width:38px;height:38px;font-size:var(--fs-md);}

    .card{padding:18px;gap:12px;border-radius:14px;}
    .cardTitle{font-size:var(--fs-lg);}
    .cardDetail{font-size:var(--fs-sm);}
    .statChips{gap:20px;}
    .statChipVal{font-size:var(--fs-lg);}
    .logBtn{width:100%;text-align:center;padding:12px 0;}
    .cardFoot{justify-content:stretch;}

    .paceGrid{grid-template-columns:repeat(2,1fr);}
    .paceCardVal{font-size:var(--fs-lg);}

    .statRow{grid-template-columns:repeat(2,1fr);}
    .statVal{font-size:var(--fs-lg);}
    .statRow .stat:last-child{grid-column:1/-1;}

    .formCard{padding:18px;border-radius:14px;}
    .grid3{grid-template-columns:1fr 1fr 1fr;gap:8px;}
    .grid2{grid-template-columns:1fr;gap:10px;}
    input.field{font-size:var(--fs-md);padding:11px 12px;}
    .onboardTitle{font-size:var(--fs-xl);}
    .onboardSub{font-size:var(--fs-sm);}
    .logoOnboard{width:160px;}

    .modal{padding:18px;border-radius:14px;}
    .rpeRow{gap:4px;}
    .rpeBtn{font-size:var(--fs-xs);padding:8px 0;}
    .modalBtns{flex-direction:column-reverse;}
    .modalBtns .cta,.modalBtns .ghostBtn{width:100%;}

    .settingsRow{font-size:var(--fs-sm);}

    .dashGrid{grid-template-columns:repeat(2,1fr);}
    .predGrid{grid-template-columns:repeat(2,1fr);}
    .recentRow{flex-wrap:wrap;gap:6px;}
  }
  @media (max-width:380px){
    .grid3{grid-template-columns:1fr 1fr 1fr;gap:6px;}
    .fieldUnit span{font-size:var(--fs-xs);right:10px;}
    input.field{padding:10px 10px;font-size:var(--fs-md);}
    .statChipVal{font-size:var(--fs-md);}
    .logoHeader{height:38px;}
  }

}

/* ---------- almacenamiento ---------- */
const _mem = {};
const storage = {
  get(k){ try{ const v=localStorage.getItem(k); return v==null?(k in _mem?{value:_mem[k]}:null):{value:v}; }catch(e){ return k in _mem?{value:_mem[k]}:null; } },
  set(k,v){ try{ localStorage.setItem(k,v); }catch(e){ _mem[k]=v; } },
  del(k){ try{ localStorage.removeItem(k); }catch(e){} delete _mem[k]; }
};

/* ---------- utilidades ---------- */
const fmtPace = (s)=>{ if(!s||!isFinite(s)) return "–:––"; const m=Math.floor(s/60),ss=Math.round(s%60); return m+":"+String(ss).padStart(2,"0"); };
const fmtTime = (t)=>{ const h=Math.floor(t/3600),m=Math.floor((t%3600)/60),s=Math.round(t%60); return h>0?h+":"+String(m).padStart(2,"0")+":"+String(s).padStart(2,"0"):m+":"+String(s).padStart(2,"0"); };
const parsePace = (str)=>{ const m=String(str).trim().match(/^(\d{1,2})[:.,'](\d{1,2})$/); if(!m) return null; const sec=parseInt(m[1])*60+parseInt(m[2]); return sec>=140&&sec<=600?sec:null; };
// parsea un tiempo total tipo "1:23:45" o "23:45" -> segundos (sin límites de rango)
const parseTimeStr = (str)=>{
  const s=String(str).trim();
  let m=s.match(/^(\d{1,2}):(\d{1,2}):(\d{1,2})$/);
  if(m) return parseInt(m[1])*3600+parseInt(m[2])*60+parseInt(m[3]);
  m=s.match(/^(\d{1,3}):(\d{1,2})$/);
  if(m) return parseInt(m[1])*60+parseInt(m[2]);
  return null;
};
const clamp = (x,a,b)=>Math.min(Math.max(x,a),b);
const esc = (s)=>String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));

/* ---------- ritmos de entrenamiento (personalizados con el gap 10K↔media y por evento) ---------- */
function paces(f, gap, ev){
  ev = ev || "hm";
  const base = {
    race:  { v:f,        label:"Ritmo competición" },
    tempo: { v:f+4,      label:"Umbral / tempo" },
    vo2:   { v:f-gap,    label:"Series (≈10K)" },
    short: { v:f-gap-8,  label:"Series cortas (≈5K)" },
    mara:  { v:f+15,     label:"Ritmo rodaje activo" },
    long:  { v:f+48,     label:"Tirada larga" },
    easy:  { v:f+65,     label:"Rodaje suave" },
  };
  if(ev==="5k"){
    base.vo2={v:f-gap-4,label:"Series VO₂máx"};
    base.short={v:f-gap-14,label:"Series velocidad"};
    base.long={v:f+55,label:"Tirada larga"};
  }
  if(ev==="mara"){
    base.mara={v:f+10,label:"Ritmo maratón"};
    base.tempo={v:f+12,label:"Umbral / tempo"};
    base.long={v:f+30,label:"Tirada larga (con tramos a RM)"};
    base.race={v:f+10,label:"Ritmo maratón"};
  }
  return base;
}

/* ---------- estructura de fases (proporcional a la duración total) ---------- */
// w: semana 1..totalWeeks ; totalWeeks incluye el taper final
function phaseOf(w, totalWeeks, ev){
  ev = ev || "hm";
  const taper = (EVENTS[ev]||EVENTS.hm).taper;
  const build = Math.max(totalWeeks - taper, 1);
  const p1 = Math.max(Math.round(build*0.35), Math.min(3, build));
  const p2 = Math.max(Math.round(build*0.30), Math.min(2, build-p1));
  const p3end = build; // resto hasta build es "específico"
  if(w > build) return {n:5, name:"Puesta a punto"};
  if(w <= p1) return {n:1, name:"Base con calidad"};
  if(w <= p1+p2) return {n:2, name:"Construcción"};
  return {n:3, name: ev==="mara" ? "Específico (ritmo maratón)" : "Específico"};
}
// descarga: una de cada 4 semanas dentro del bloque de carga (no en taper, ni la primera semana)
function isRecovery(w, totalWeeks, ev){
  ev = ev || "hm";
  const taper=(EVENTS[ev]||EVENTS.hm).taper;
  const build=Math.max(totalWeeks-taper,1);
  return w>1 && w<=build && w%4===0;
}

const S = (id,tipo,titulo,detalle,paceKey,quality=false,gym=false)=>({id,tipo,titulo,detalle,paceKey,quality,gym});

/* ---------- modelo de bloques ----------
   Una sesión con `blocks` describe su estructura real:
   {type:"warmup"|"cooldown", minutes}
   {type:"work", reps, distance(m) | minutes, paceKey, recoverySec, recoveryType:"jog"|"walk"}
   El bloque "work" principal (el que se registra y adapta) se marca con `key:true`.
*/
const SB = (id,tipo,titulo,detalle,paceKey,quality,blocks,gym=false)=>
  ({id,tipo,titulo,detalle,paceKey,quality,gym,blocks});

// minutos de un bloque de trabajo a un ritmo dado (s/km)
function workBlockMinutes(b, paceSecPerKm){
  if(b.minutes!=null) return b.reps*b.minutes;
  const km=b.distance/1000;
  return b.reps*(km*paceSecPerKm/60) + (b.reps-1)*(b.recoverySec||0)/60;
}
// minutos totales de una sesión a partir de sus bloques
function blocksMinutes(blocks, P){
  return Math.round(blocks.reduce((sum,b)=>{
    if(b.type==="warmup"||b.type==="cooldown") return sum+b.minutes;
    if(b.type==="work") return sum+workBlockMinutes(b, P[b.paceKey].v);
    return sum;
  },0));
}
// el bloque de trabajo principal (el primero con key:true, o el primer "work")
function mainWorkBlock(blocks){
  return blocks.find(b=>b.type==="work"&&b.key) || blocks.find(b=>b.type==="work");
}
// descripción corta de un bloque de trabajo: "6 × 1000 m" o "4 × 4′"
function workBlockLabel(b){
  return b.reps+" × "+(b.minutes!=null ? b.minutes+"′" : b.distance+" m");
}
// aplica el ajuste de volumen vigente a los bloques de trabajo de una sesión (clona)
function applyVolumeAdj(blocks, adj){
  if(!blocks || !adj || (adj.repsDelta===0 && adj.recoveryMult===1)) return blocks;
  return blocks.map(b=>{
    if(b.type!=="work") return b;
    const nb={...b};
    if(adj.repsDelta) nb.reps=Math.max(2, b.reps+adj.repsDelta);
    if(adj.recoveryMult && b.recoverySec) nb.recoverySec=Math.round(b.recoverySec*adj.recoveryMult);
    return nb;
  });
}
// recalcula títulos que dependen del nº de reps ("6×1000 m") tras aplicar el ajuste
function syncTitleToBlocks(sess){
  if(!sess.blocks) return sess;
  const mwb=mainWorkBlock(sess.blocks);
  if(!mwb) return sess;
  const m=sess.titulo.match(/^(\d+)(×.+)$/);
  if(m && parseInt(m[1])!==mwb.reps) sess.titulo=mwb.reps+m[2];
  return sess;
}
// horas de recuperación recomendadas antes de la siguiente sesión exigente,
// según el tipo e intensidad del estímulo (principio general: a mayor intensidad
// y impacto neuromuscular, más tiempo de adaptación antes de repetir esfuerzo).
function recoveryHours(sess){
  if(sess.gym) return 24; // fuerza: 24h antes de otra sesión de fuerza o de calidad
  const mwb=sess.blocks?mainWorkBlock(sess.blocks):null;
  switch(sess.tipo){
    case "CARRERA":   return 72; // el objetivo del plan: recuperación larga garantizada (taper posterior)
    case "RITMO":     return 48; // bloques largos a ritmo de competición/maratón: alta carga específica
    case "LARGA":     return 36; // impacto acumulado y duración, aunque sea a ritmo suave
    case "SERIES":    return mwb && mwb.paceKey==="race" ? 48 : 36; // más dura cuanto más cerca del ritmo de carrera
    case "TEMPO":     return 24; // umbral: exigente pero metabólicamente más manejable
    case "FARTLEK":   return 24;
    case "ACTIVACIÓN":return 12;
    case "RODAJE":    return 12; // recuperación activa: apenas restringe la siguiente sesión
    default:          return 12;
  }
}
function fmtRecHours(h){ return h>=24 ? Math.round(h/24)+(h===24?" día":" días") : h+" h"; }
// formatea la recuperación entre repeticiones: "90″" o "2′"
function fmtRecovery(sec){
  return sec>=60 ? Math.round(sec/60)+"′" : sec+"″";
}

  else if(ph===1){ pool=[
    ["Fuerza general A","Sentadilla, peso muerto rumano, zancadas y plancha. 3–4×8–10. Técnica sobre carga."],
    ["Fuerza general B","Sentadilla búlgara, puente de glúteo, gemelo y core anti-rotación. 3×10."],
    ["Core y estabilidad","Core, estabilidad de cadera y propiocepción a una pierna. 3 vueltas."]
  ]; }
  else if(ph===2){ pool=[
    ["Fuerza + pliometría A","Sentadilla pesada 4×5, saltos al cajón 4×5 y core. Descansos completos."],
    ["Fuerza + pliometría B","Peso muerto 4×5, multisaltos, zancada con salto y core."],
    ["Pliometría ligera","Comba, skipping, tobillo reactivo y movilidad. Calidad de impacto."]
  ]; }
  else { pool=[
    ["Mantenimiento de fuerza A","Cargas moderadas explosivas 3×5, skipping y core. Mantener, no fatigar."],
    ["Mantenimiento de fuerza B","Fuerza ligera, pliometría corta y movilidad. Piernas frescas."],
    ["Core y movilidad","Core, estabilidad de cadera y movilidad. Sesión de soporte."]
  ]; }
  const out=[];
  for(let i=0;i<count;i++){ const it=pool[i%pool.length]; out.push(S("g"+(i+1),"GIMNASIO",it[0],it[1],null,false,true)); }
  return out;
}

/* selección de la semana según días de carrera + añade gimnasio */
// aplica posposiciones/eliminaciones guardadas en state.overrides a las sesiones de carrera de la semana w
// (no afecta a sesiones de gimnasio, que se gestionan aparte)
/* ---------- modelo de posposición/eliminación: intercambio simétrico ----------
   Para cada sesión postpuesta se guarda en overrides:
     "wN-<id>" = "postponed" | "deleted" | "postponed-to-prev"
     "swap-N-<id>" = sesión completa que ocupa el hueco dejado por <id> en la semana N
   Esto mantiene el número de sesiones por semana constante: si X se pospone,
   una sesión de la semana siguiente ocupa su lugar, y X ocupa el de esa sesión.
*/
/* ---------- modelo de posposición/eliminación ----------
   "Posponer" significa: ese día no se entrenó (enfermedad, lluvia...) y la
   sesión se traslada a la semana siguiente. Reglas:
   - Sesión de CALIDAD pospuesta -> se añade a la semana siguiente, y para no
     inflar esa semana se elimina de ella una sesión de rodaje/tirada larga
     (la menos específica). Si no hay ninguna, la semana siguiente crece igualmente.
   - Tirada LARGA pospuesta -> se añade a la semana siguiente sin compensación
     (esa semana crece en una sesión: recuperar el fondo es prioritario).
   overrides:
     "wN-<id>" = "deleted" | "postponed"
     "incoming-N" = [sesiones completas que se añaden al principio de la semana N]
*/
function applyOverrides(runs, w){
  if(!state || !state.overrides) return runs;
  const ov=state.overrides;
  const out=[];
  const incoming=ov["incoming-"+w];
  if(incoming && incoming.length){
    incoming.forEach(s=>out.push({...s,_postponedFrom:s._fromWeek}));
  }
  runs.forEach(sess=>{
    const key="w"+w+"-"+sess.id;
    const st=ov[key];
    if(st==="deleted") return; // se omite (eliminada, o sacrificada para compensar una posposición)
    if(st==="postponed") return; // se movió a la semana siguiente (ya incluida arriba como incoming)
    out.push(sess);
  });
  // orden manual: el usuario puede reordenar las sesiones de una semana arrastrándolas
  // con las flechas ▲▼. Si hay un orden guardado, se respeta; las sesiones nuevas
  // que no estuvieran en ese orden (p. ej. llegadas por posposición después) van al final.
  const order=ov["order-"+w];
  if(order && order.length){
    const byId={}; out.forEach(s=>byId[s.id]=s);
    const reordered=[];
    order.forEach(id=>{ if(byId[id]){ reordered.push(byId[id]); delete byId[id]; } });
    Object.values(byId).forEach(s=>reordered.push(s)); // lo que sobre, al final
    return reordered;
  }
  return out;
}

// reduce un 15% la duración indicada en el título de sesiones de rodaje/tirada larga
// (mismo recorte que usan las semanas de descarga, aplicado aquí por fatiga real)
function applyWeekVolumeCut(sess){
  if(sess.tipo!=="RODAJE" && sess.tipo!=="LARGA") return sess;
  const m=sess.titulo.match(/^(.*\D)(\d+)(′)$/);
  if(!m) return sess;
  const mins=Math.max(15, Math.round(parseInt(m[2])*0.85));
  return {...sess, titulo:m[1]+mins+m[3]};
}

// sesiones "originales" de la semana, antes de aplicar posposiciones/eliminaciones
// (se usa para poder mostrar y deshacer las sesiones ocultas por overrides)
function buildWeekRaw(w, runDays, totalWeeks, ev, goalPace){
  let runs=runSessions(w, totalWeeks, ev, goalPace);
  const adj=(typeof state!=="undefined" && state && state.volumeAdj) || null;
  if(adj){
    runs=runs.map(s=>{
      if(!s.blocks) return s;
      const ns={...s, blocks: applyVolumeAdj(s.blocks, adj)};
      return syncTitleToBlocks(ns);
    });
  }
  if(w!==totalWeeks){
    const byId={}; runs.forEach(s=>byId[s.id]=s);
    let chosen;
    if(runDays<=3) chosen=["s1","s3","s5"];
    else if(runDays===4) chosen=["s1","s3","s4","s5"];
    else chosen=["s1","s2","s3","s4","s5"];
    runs=chosen.map(id=>byId[id]).filter(Boolean);
    if(runDays>=6) runs.splice(runs.length-1,0,S("s6","RODAJE","Rodaje suave 35′","Día extra de volumen aeróbico, muy suave.","easy"));
  }
  return runs;
}

function buildWeek(w, runDays, gymDays, totalWeeks, ev, goalPace){
  let runs=buildWeekRaw(w, runDays, totalWeeks, ev, goalPace);
  runs=applyOverrides(runs, w);
  // recorte de volumen por fatiga sostenida: activo durante la semana de detección y la siguiente
  const wa=(typeof state!=="undefined" && state && state.weekAdj) || null;
  if(wa && wa.active && wa.since!=null && (w===wa.since || w===wa.since+1)){
    runs=runs.map(applyWeekVolumeCut);
  }
  return runs.concat(gymSessions(w, gymDays, totalWeeks, ev));
}

/* ---------- lógica adaptativa ---------- */
function adaptFitness(fitness, prescribed, actual, rpe, initialPace, goalPace){
  const delta=prescribed-actual;
  let adj=Math.max(-5,Math.min(4,delta*0.35));
  if(rpe>=9) adj=Math.min(adj,0)-1.5;
  else if(rpe>=8&&adj>0) adj*=0.4;
  else if(rpe<=4&&delta>=-2) adj+=1;
  const next=fitness-adj;
  return { next: clamp(next, goalPace-6, initialPace+20), adj };
}

// fecha del lunes de la semana w del plan
function mondayOfWeek(w){
  const start=new Date(state.startDate);
  const startDay=start.getDay(); // 0=Dom..6=Sáb
  const mondayOffset = startDay===0 ? -6 : 1-startDay;
  const monday=new Date(start); monday.setDate(start.getDate()+mondayOffset);
  monday.setHours(0,0,0,0);
  monday.setDate(monday.getDate() + (w-1)*7);
  return monday;
}
// fecha concreta para la sesión nº `idx` (0-based, en el orden de buildWeek) de la semana w
function dateForSession(w, idx){
  const days=state.profile.trainingDays || WEEK_ORDER.slice(0,state.profile.runDays);
  const dayOfWeek=days[idx % days.length]; // 0=Dom..6=Sáb
  const monday=mondayOfWeek(w);
  const offset=WEEK_ORDER.indexOf(dayOfWeek); // 0..6, posición Lu..Do
  const d=new Date(monday); d.setDate(monday.getDate()+offset);
  return d;
}
const YMD=(d)=>d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");

// icono y color por tipo de sesión, para el calendario
const CAL_COLOR={SERIES:"#FC5E15",TEMPO:"#FC5E15",FARTLEK:"#FC5E15",RITMO:"#FC5E15",LARGA:"#0F1525",RODAJE:"#9A927F",ACTIVACIÓN:"#C8901F",CARRERA:"#FC5E15",GIMNASIO:"#C8901F"};
const CAL_ICON={SERIES:"⚡",TEMPO:"🔥",FARTLEK:"⚡",RITMO:"🎯",LARGA:"🛣️",RODAJE:"👟",ACTIVACIÓN:"✨",CARRERA:"🏁",GIMNASIO:"🏋️"};

// construye un índice fecha (YYYY-MM-DD) -> lista de {week, sess, sessIdx}
function buildSessionCalendar(){
  const idx={};
  for(let w=1;w<=state.totalWeeks;w++){
    const ss=buildWeek(w,state.profile.runDays,state.profile.gymDays,state.totalWeeks,state.event,state.goalPace);
    const runs=ss.filter(s=>!s.gym);
    runs.forEach((sess,i)=>{
      const d=YMD(dateForSession(w,i));
      if(!idx[d]) idx[d]=[];
      idx[d].push({week:w,sess,sessIdx:i});
    });
    // el gimnasio se reparte en los días "libres" de esa semana, si los hay;
    // si no, se acumula en el último día de entrenamiento
    const gyms=ss.filter(s=>s.gym);
    const days=state.profile.trainingDays||WEEK_ORDER.slice(0,state.profile.runDays);
    const freeSlots=WEEK_ORDER.filter(d=>!days.includes(d));
    gyms.forEach((g,i)=>{
      let d;
      if(freeSlots[i]!=null){
        const monday=mondayOfWeek(w);
        const off=WEEK_ORDER.indexOf(freeSlots[i]);
        const dd=new Date(monday); dd.setDate(monday.getDate()+off);
        d=YMD(dd);
      } else {
        d=YMD(dateForSession(w,runs.length-1));
      }
      if(!idx[d]) idx[d]=[];
      idx[d].push({week:w,sess:g,sessIdx:-1});
    });
  }
  return idx;
}

function calendarTabHTML(){

      cell+='<div class="'+cls+'" style="--pillColor:'+color+'" data-week="'+e.week+'" title="'+esc(e.sess.titulo)+'">'+icon+' '+esc(e.sess.titulo.length>14?e.sess.titulo.slice(0,13)+"…":e.sess.titulo)+(log?' ✓':'')+'</div>';
    });
    cell+='</div>';
    html+=cell;
  }
  html+='</div>';

  html+='<div class="calLegend">';
  [["SERIES/TEMPO/RITMO","#FC5E15"],["TIRADA LARGA","#0F1525"],["RODAJE","#9A927F"],["GIMNASIO/ACTIVACIÓN","#C8901F"]].forEach(([l,c])=>{
    html+='<span class="calLegendItem"><span class="calDot" style="background:'+c+'"></span>'+l+'</span>';
  });
  html+='</div>';

  return html;
}

function showToast(msg, err=false){
  let t=document.getElementById("toast");
  if(!t){ t=document.createElement("div"); t.id="toast"; document.body.appendChild(t); }
  t.className="toast"+(err?" err":""); t.textContent=msg;
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>{ if(t) t.remove(); },4600);
}

/* convierte un ritmo de 10K o de media a un ritmo equivalente en la distancia del evento (Riegel) */
function paceToEvent(paceMinPerKm, fromDist, ev){
  const toDist=(EVENTS[ev]||EVENTS.hm).dist;
  const timeFrom=paceMinPerKm*fromDist;
  const timeTo=timeFrom*Math.pow(toDist/fromDist,1.06);
  return timeTo/toDist;
}

function authErrorMsg(e){
  const c=(e&&e.code)||"";
  if(c.includes("email-already-in-use")) return "Ese email ya tiene una cuenta. Prueba a iniciar sesión.";
  if(c.includes("invalid-email")) return "Email no válido.";
  if(c.includes("weak-password")) return "La contraseña es demasiado débil (mínimo 6 caracteres).";
  if(c.includes("user-not-found")||c.includes("wrong-password")||c.includes("invalid-credential")) return "Email o contraseña incorrectos.";
  if(c.includes("too-many-requests")) return "Demasiados intentos. Espera un momento y vuelve a intentarlo.";
  if(c.includes("network-request-failed")) return "Sin conexión. Comprueba tu internet.";
  return "Ha ocurrido un error. Inténtalo de nuevo.";
}

function createPlan(){
  syncObInputs();
  const o=ui.ob;
  const ev=o.event;
  const evCfg=EVENTS[ev]||EVENTS.hm;
  if(!o.raceDate){ showToast("Indica la fecha de la prueba.", true); return; }
  const trainingDays=(o.trainingDays||[]).slice();
  if(trainingDays.length<3 || trainingDays.length>6){ showToast("Elige entre 3 y 6 días de entrenamiento.", true); return; }
  const totalWeeks=weeksUntil(o.raceDate);
  if(totalWeeks < evCfg.minW){ showToast("Esa fecha está muy cerca para un "+evCfg.label+" ("+totalWeeks+" sem.). Mínimo recomendado: "+evCfg.minW+" semanas.", true); return; }
  let cappedWeeks=totalWeeks;
  if(totalWeeks > evCfg.maxW){ cappedWeeks=evCfg.maxW; }

  const age=parseInt(o.age), height=parseInt(o.height), weight=parseFloat(String(o.weight).replace(",","."));
  if(!(age>=12&&age<=90)){ showToast("Revisa la edad (años).", true); return; }
  if(!(height>=120&&height<=220)){ showToast("Revisa la altura (cm).", true); return; }
  if(!(weight>=30&&weight<=180)){ showToast("Revisa el peso (kg).", true); return; }
  const c10=parsePace(o.c10), cHM=parsePace(o.cHM), t10=parsePace(o.t10), tHM=parsePace(o.tHM);
  if(!c10){ showToast("Ritmo actual de 10K no válido (m:ss).", true); return; }
  if(!cHM){ showToast("Ritmo actual de media no válido (m:ss).", true); return; }
  if(!t10){ showToast("Ritmo objetivo de 10K no válido (m:ss).", true); return; }
  if(!tHM){ showToast("Ritmo objetivo de media no válido (m:ss).", true); return; }
  if(cHM<=c10){ showToast("Tu media no puede ir más rápida que tu 10K. Revisa los ritmos actuales.", true); return; }
  if(tHM<=t10){ showToast("El objetivo de media no puede ir más rápido que el de 10K.", true); return; }
  if(tHM>=cHM){ showToast("El objetivo de media debe ser más rápido que tu marca actual.", true); return; }

  const gap=clamp(cHM-c10,6,30);
  // ritmo actual y objetivo en la distancia de la prueba elegida
  const curEv = ev==="10k" ? c10 : ev==="hm" ? cHM : paceToEvent(cHM,21.0975,ev);
  const goalEv = ev==="10k" ? t10 : ev==="hm" ? tHM : paceToEvent(tHM,21.0975,ev);

  state={
    startDate:new Date().toISOString(),
    event:ev, totalWeeks:cappedWeeks, raceDate:o.raceDate, requestedWeeks:totalWeeks,
    profile:{runDays:trainingDays.length, gymDays:o.gymDays, age, height, weight, trainingDays},
    current10k:c10, currentHM:cHM, target10k:t10, goalHM:tHM, gap,
    initialPace:curEv, fitnessPace:curEv, goalPace:goalEv,
    history:[{date:new Date().toISOString(), pace:curEv, note:"Punto de partida"}],
    logs:{}, hardStreak:0, volumeAdj:{repsDelta:0,recoveryMult:1,reason:"hold"}, overrides:{}, weekAdj:{active:false,reason:null,since:null,postponedLong:false},
  };
  save(); ui.viewWeek=1; ui.tab="resumen"; ui.ob=null;
  render();
  let msg="Plan creado: "+evCfg.label+" en "+cappedWeeks+" semanas. Objetivo "+fmtPace(goalEv)+"/km ("+fmtTime(goalEv*evCfg.dist)+").";
  if(totalWeeks>evCfg.maxW) msg+=" Tu fecha da para más, pero el bloque específico de "+evCfg.label+" no necesita tanto: empezamos "+ (totalWeeks-cappedWeeks) +" semanas más tarde.";
  showToast(msg);
}

// RPE esperado de una sesión según su tipo (referencia para el feedback post-sesión)
function expectedRPE(sess){
  if(sess.tipo==="CARRERA") return 9;
  if(sess.quality) return 7;
  return 4;
}

function adaptVolume(sess, repsDone, rpe){
  const mwb=sess.blocks?mainWorkBlock(sess.blocks):null;
  if(!mwb || mwb.reps<=1) return null; // sesión sin estructura de repeticiones: no hay volumen que ajustar
  const completed = repsDone==null ? mwb.reps : repsDone;
  const fullDone = completed >= mwb.reps;
  if(!fullDone && rpe>=8) return {repsDelta:-1, recoveryMult:1.25, reason:"reduce"};
  if(rpe>=9) return {repsDelta:0, recoveryMult:1.2, reason:"recover"};
  if(fullDone && rpe<=4) return {repsDelta:1, recoveryMult:0.9, reason:"increase"};
  return {repsDelta:0, recoveryMult:1, reason:"hold"};
}

function logSession(weekN, sess, paceStr, rpe, note, repsDone){
  const actual=parsePace(paceStr);
  if(!actual){ showToast("Ritmo no válido. Formato m:ss, p. ej. 3:52.", true); return; }
  const f=state.fitnessPace;
  const mwb=sess.blocks?mainWorkBlock(sess.blocks):null;
  const prescribed=mwb?paces(f,state.gap,state.event)[mwb.paceKey].v:paces(f,state.gap,state.event)[sess.paceKey].v;
  const key="w"+weekN+"-"+sess.id;
  state.logs[key]={pace:actual,rpe,note,repsDone:repsDone!=null?repsDone:null,date:new Date().toISOString()};

  // --- feedback inmediato: compara lo previsto con lo realmente ocurrido ---
  const fb=[];
  const expRpe=expectedRPE(sess);
  if(rpe-expRpe>=2) fb.push("RPE "+rpe+" en una sesión prevista como RPE ~"+expRpe+": fue más dura de lo esperado.");
  else if(expRpe-rpe>=2) fb.push("RPE "+rpe+" en una sesión prevista como RPE ~"+expRpe+": fue más cómoda de lo esperado.");
  const paceDelta=Math.round(prescribed-actual); // + = más rápido de lo previsto
  if(Math.abs(paceDelta)>=8){
    fb.push(paceDelta>0
      ? "Has ido "+paceDelta+" s/km más rápido de lo programado."
      : "Has ido "+Math.abs(paceDelta)+" s/km más lento de lo programado.");
  }

  let msg;
  if(sess.quality){
    const {next,adj}=adaptFitness(f,prescribed,actual,rpe,state.initialPace,state.goalPace);
    state.fitnessPace=Math.round(next*10)/10;
    state.history.push({date:new Date().toISOString(),pace:state.fitnessPace});
    state.hardStreak=rpe>=9?state.hardStreak+1:0;
    if(adj>0.5) msg="Buen trabajo: ritmos ajustados "+Math.abs(adj).toFixed(1)+" s/km más rápidos.";
    else if(adj<-0.5) msg="Sesión exigente: ritmos suavizados "+Math.abs(adj).toFixed(1)+" s/km para asimilar la carga.";
    else msg="Sesión en el clavo. Ritmos sin cambios.";
    if(state.hardStreak>=3) msg+=" ⚠ Llevas 3 sesiones al límite: prioriza descanso.";

    // --- adaptación de volumen (reps/recuperación), independiente del ajuste de ritmo ---
    const va=adaptVolume(sess, repsDone, rpe);
    if(va){
      state.volumeAdj=va;
      if(va.reason==="reduce") msg+=" La próxima sesión similar tendrá una repetición menos y más recuperación: prioriza terminar entero.";
      else if(va.reason==="recover") msg+=" Esfuerzo al límite: la próxima sesión similar tendrá más recuperación entre series.";
      else if(va.reason==="increase") msg+=" Lo hiciste todo y de sobra: la próxima sesión similar añade una repetición más.";
      else if(state.volumeAdj && (state.volumeAdj.repsDelta!==0 || state.volumeAdj.recoveryMult!==1)){
        msg+=" Volumen de series vuelve a su valor habitual.";
      }
    }
  } else {
    state.hardStreak=rpe>=9?state.hardStreak+1:state.hardStreak;
    msg=rpe>=8?"Registrado. Un rodaje suave no debería costar tanto: vigila la fatiga.":"Registrado. Los rodajes suaves no modifican los ritmos.";
  }
  save();

  // aviso de carga: si la semana en curso ya supera claramente lo previsto
  const hist=buildHistory();
  const curWk=hist.weeks[hist.curWeek];
  if(curWk && curWk.plannedMin>0 && curWk.doneMin > curWk.plannedMin*1.15 && curWk.doneCount>=2){
    fb.push("Tu carga esta semana ya supera lo previsto ("+Math.round(curWk.doneMin)+" de "+Math.round(curWk.plannedMin)+" min planeados). Vigila la fatiga en los próximos días.");
  }

  // --- ajuste semanal: activación/desactivación según fatiga sostenida ---
  if(!state.weekAdj) state.weekAdj={active:false, reason:null, since:null, postponedLong:false};
  const ac=acwr(hist);
  const overloaded = state.hardStreak>=3 || (ac.ratio!=null && ac.ratio>1.3);
  if(!state.weekAdj.active && overloaded){
    state.weekAdj={active:true, reason: state.hardStreak>=3?"hardStreak":"acwr", since:hist.curWeek, postponedLong:false};
    fb.push("Llevas varias sesiones acumulando fatiga"+(ac.ratio!=null&&ac.ratio>1.3?" y tu carga aguda supera bastante a la habitual":"")+": reduzco el volumen de rodajes y tirada larga un 15% durante esta semana y la próxima, hasta que recuperes ritmo.");
    // si la tirada larga de esta semana aún no se ha hecho, se pospone para no sumar más carga ahora
    const longSess=hist.weeks[hist.curWeek] && hist.weeks[hist.curWeek].sessions.find(s=>s.tipo==="LARGA" && !state.logs["w"+hist.curWeek+"-"+s.id]);
    if(longSess && hist.curWeek<state.totalWeeks){
      postponeSession(hist.curWeek, longSess);
      state.weekAdj.postponedLong=true;
      fb.push("También he movido la tirada larga de esta semana a la siguiente, para dar margen a recuperar.");
    }
  } else if(state.weekAdj.active && !overloaded && sess.quality && rpe<=6 && (repsDone==null || (mwb && repsDone>=mwb.reps))){
    // dos señales seguidas de "todo bien" desactivan el ajuste (hardStreak ya se resetea a 0 arriba si rpe<9)
    if(state.hardStreak===0){
      state.weekAdj={active:false, reason:null, since:null, postponedLong:false};
      fb.push("Buenas señales en las últimas sesiones: el plan vuelve a su volumen habitual.");
    }
  }

  if(fb.length) msg = fb.join(" ") + " " + msg;
  ui.modal=null; render(); showToast(msg);
}

function toggleGym(weekN, sessId){
  const key="w"+weekN+"-"+sessId;
  if(state.logs[key]) delete state.logs[key]; else state.logs[key]={done:true,date:new Date().toISOString()};
  save(); render();
}

// posponer: mueve la sesión al final de esta semana, o si ya estaba ahí, a la semana siguiente
// candidata a intercambio: sesión de rodaje suave sin log, lo más "neutra" posible
// (se evita mover sesiones de calidad o la tirada larga, que son las que definen la semana)
// candidata a "sacrificar" en la semana siguiente cuando se pospone una sesión
// de calidad: una sesión de rodaje o tirada larga sin registrar todavía
// (se prioriza rodaje sobre tirada larga, para no tocar el fondo si se puede evitar)
function findCompensationCandidate(weekSessions, weekN){
  const noLog=s=>!s.gym && !state.logs["w"+weekN+"-"+s.id];
  const rodajes=weekSessions.filter(s=>noLog(s) && s.tipo==="RODAJE");
  if(rodajes.length) return rodajes[rodajes.length-1];
  const largas=weekSessions.filter(s=>noLog(s) && s.tipo==="LARGA");
  if(largas.length) return largas[0];
  return null;
}

// posponer: ese día no se entrenó (enfermedad, lluvia...) y la sesión se traslada
// a la semana siguiente.
//  - Si era una sesión de CALIDAD: se añade a la semana siguiente, y se elimina de
//    ella un rodaje/tirada larga para compensar (si existe alguno disponible).
//  - Si era la TIRADA LARGA: se añade a la semana siguiente sin compensación,
//    porque recuperar el fondo tiene prioridad.
// intercambia la posición de una sesión de carrera con la inmediatamente
// anterior o siguiente dentro de la misma semana (gimnasio y carrera final no se mueven)
function swapSessions(weekN, sessId, direction){
  const all=buildWeek(weekN,state.profile.runDays,state.profile.gymDays,state.totalWeeks,state.event,state.goalPace);
  const runs=all.filter(s=>!s.gym);
  const idx=runs.findIndex(s=>s.id===sessId);
  if(idx<0) return;
  const otherIdx=idx+direction;
  if(otherIdx<0 || otherIdx>=runs.length) return;
  if(runs[idx].tipo==="CARRERA" || runs[otherIdx].tipo==="CARRERA") return; // la sesión de carrera no se reordena
  const order=runs.map(s=>s.id);
  [order[idx], order[otherIdx]]=[order[otherIdx], order[idx]];
  if(!state.overrides) state.overrides={};
  state.overrides["order-"+weekN]=order;
  save(); render();
}

function postponeSession(weekN, sess){
  if(weekN>=state.totalWeeks){ showToast("No se puede posponer la última semana del plan.", true); return; }
  if(!state.overrides) state.overrides={};

  state.overrides["w"+weekN+"-"+sess.id]="postponed";
  const nextKey="incoming-"+(weekN+1);
  if(!state.overrides[nextKey]) state.overrides[nextKey]=[];
  state.overrides[nextKey].push({...sess, id:sess.id+"-pp"+weekN, _fromWeek:weekN});

  if(sess.quality){
    const nextWeek=buildWeek(weekN+1,state.profile.runDays,state.profile.gymDays,state.totalWeeks,state.event,state.goalPace).filter(s=>!s.gym);
    const comp=findCompensationCandidate(nextWeek, weekN+1);
    if(comp){
      state.overrides["w"+(weekN+1)+"-"+comp.id]="deleted";
      save(); render();
      showToast("Sesión movida a la semana "+(weekN+1)+". Para compensar, se ha eliminado de esa semana: \""+comp.titulo+"\".");
    } else {
      save(); render();
      showToast("Sesión movida a la semana "+(weekN+1)+". No había rodaje ni tirada larga que quitar para compensar, así que esa semana tendrá una sesión más.");
    }
  } else if(sess.tipo==="LARGA"){
    save(); render();
    showToast("Tirada larga movida a la semana "+(weekN+1)+". Recuperar el fondo es prioritario, así que se añade sin quitar nada más esa semana.");
  } else {
    save(); render();
    showToast("Sesión movida a la semana "+(weekN+1)+".");
  }
}

// eliminar: la sesión desaparece de la semana, sin reemplazo
function deleteSession(weekN, sess){
  if(!state.overrides) state.overrides={};
  state.overrides["w"+weekN+"-"+sess.id]="deleted";
  save(); render();
  showToast("Sesión eliminada de la semana "+weekN+". El resto del plan se ha recalculado.");
}

// deshacer una posposición o eliminación
// deshacer una posposición o eliminación, incluyendo la compensación asociada
// (si al posponer una sesión de calidad se eliminó otra para compensar, se restaura también)
function restoreSession(weekN, sess){
  if(!state.overrides) return;
  const key="w"+weekN+"-"+sess.id;
  const st=state.overrides[key];
  if(!st) return;
  if(st==="postponed"){
    const nextWeek=weekN+1;
    const nextKey="incoming-"+nextWeek;
    const movedId=sess.id+"-pp"+weekN;
    if(state.overrides[nextKey]){
      // si esa sesión movida provocó la eliminación de otra (compensación), la restauramos
      state.overrides[nextKey].forEach(()=>{});
      for(const k in state.overrides){
        if(k.startsWith("w"+nextWeek+"-") && state.overrides[k]==="deleted"){
          // heurística: si solo hay una sesión "incoming" para esta semana siguiente
          // y coincide con la que estamos deshaciendo, asumimos que esa eliminación
          // fue su compensación y la revertimos también
          const onlyThisIncoming=state.overrides[nextKey].length===1 && state.overrides[nextKey][0].id===movedId;
          if(onlyThisIncoming) delete state.overrides[k];
        }
      }
      state.overrides[nextKey]=state.overrides[nextKey].filter(s=>s.id!==movedId);
      if(state.overrides[nextKey].length===0) delete state.overrides[nextKey];
    }
  }
  delete state.overrides[key];
  save(); render();
  showToast("Sesión restaurada en la semana "+weekN+".");
}

/* ---------- exportación de datos ---------- */
function downloadFile(filename, content, mime){
  const blob=new Blob([content], {type:mime});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url; a.download=filename;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url), 1000);
}
function csvEscape(v){
  const s=String(v==null?"":v);
  return /[",\n;]/.test(s) ? '"'+s.replace(/"/g,'""')+'"' : s;
}
function exportData(format){
  const stamp=new Date().toISOString().slice(0,10);
  if(format==="json"){
    downloadFile("goat-pace-backup-"+stamp+".json", JSON.stringify(state,null,2), "application/json");
    showToast("Descarga iniciada: copia de seguridad completa en JSON.");
    return;
  }
  // CSV: una fila por sesión registrada, con su fecha real, tipo, ritmo previsto/real, RPE y nota
  const P=paces(state.fitnessPace,state.gap,state.event);
  const rows=[["semana","fecha","tipo","titulo","ritmo_previsto_min_km","ritmo_real_min_km","rpe","repeticiones_hechas","nota"]];
  for(let w=1;w<=state.totalWeeks;w++){
    const ss=buildWeek(w,state.profile.runDays,state.profile.gymDays,state.totalWeeks,state.event,state.goalPace);
    const runs=ss.filter(s=>!s.gym);
    runs.forEach((sess,i)=>{
      const log=state.logs["w"+w+"-"+sess.id];
      if(!log) return;
      const mwb=sess.blocks?mainWorkBlock(sess.blocks):null;
      const prescribed=mwb?P[mwb.paceKey].v:P[sess.paceKey].v;
      const fecha=YMD(dateForSession(w,i));
      rows.push([w, fecha, sess.tipo, sess.titulo, fmtPace(prescribed), fmtPace(log.pace), log.rpe, log.repsDone!=null?log.repsDone:"", log.note||""]);
    });
  }
  const csv=rows.map(r=>r.map(csvEscape).join(";")).join("\n");
  downloadFile("goat-pace-sesiones-"+stamp+".csv", "\ufeff"+csv, "text/csv;charset=utf-8");
  showToast("Descarga iniciada: "+(rows.length-1)+" sesiones registradas en CSV.");
}

  state=null; ui.tab="resumen"; ui.modal=null; ui.ob=defaultOb(); render();

  if(!auth.ready){ root.innerHTML='<div class="shell"><div class="loadingScreen"><img class="logoOnboard" src="'+LOGO+'" alt="GOAT PACE"><div class="note" style="margin-top:14px">Cargando…</div></div></div>'; return; }
  if(!auth.user){ root.innerHTML=authHTML(); wire(); return; }
  if(state===null){ if(!ui.ob) ui.ob=defaultOb(); root.innerHTML=onboardHTML(); wire(); return; }

  const f=state.fitnessPace, P=paces(f,state.gap,state.event);
  const curWeek=currentWeekOf(state.startDate,state.totalWeeks);
  const progress=Math.min(100,Math.max(0,Math.round(((state.initialPace-f)/Math.max(state.initialPace-state.goalPace,1))*100)));

  if(ui.tab==="volumen")  body=volumeTabHTML();
  if(ui.tab==="ritmos")   body=pacesTabHTML(P);
  if(ui.tab==="ajustes")  body=settingsTabHTML();

  root.innerHTML=
    '<div class="shell">' +
      '<header>' +
      '<div class="headerTop">' +
        '<div class="titleRow"><img class="logoHeader" src="'+LOGO+'" alt="GOAT PACE">' +
        '<div><div class="eyebrow">PLAN '+state.totalWeeks+' SEMANAS · '+EVENTS[state.event].label.toUpperCase()+'</div>' +
        '<div class="bigTitle">OBJETIVO <span class="accent">'+fmtPace(state.goalPace)+'</span><span class="unit">/km</span></div></div></div>' +
        '<div class="bibBox"><div class="bibLabel">RITMO ACTUAL</div><div class="bibPace">'+fmtPace(f)+'</div>' +
        '<div class="bibSub">≈ '+fmtTime(f*EVENTS[state.event].dist)+' en meta</div></div>' +
        '<button class="logoutIcon" data-logout="1" title="Cerrar sesión">⏻</button>' +
      '</div>' +
      '<div class="progressRow"><div class="progressTrack"><div class="progressFill" style="width:'+progress+'%"></div><div class="progressGoal"></div></div>' +
      '<div class="progressTxt">'+progress+'% hacia '+fmtPace(state.goalPace)+' · carrera ≈ '+raceDate.toLocaleDateString("es-ES",{day:"numeric",month:"short",year:"numeric"})+'</div></div></header>' +
      '<nav class="tabs">'+tabBtn("resumen","Resumen")+tabBtn("calendario","Calendario")+tabBtn("semana","Entrenamientos")+tabBtn("progreso","Progreso")+tabBtn("volumen","Volumen")+tabBtn("ritmos","Mis ritmos")+tabBtn("ajustes","Ajustes")+'</nav>' +
      '<main>'+body+'</main>' +
    '</div>' +
    bottomNavHTML() +
    (ui.modal?modalHTML(P):"") +
    (ui.tracker?trackerHTML(P):"");
  wire();
}

// navegación inferior para móvil: 4 accesos directos + "Más" con el resto de pestañas

const MORE_TABS=[["volumen","Volumen"],["ritmos","Mis ritmos"],["ajustes","Ajustes"]];
function bottomNavHTML(){
  const moreActive=MORE_TABS.some(([k])=>k===ui.tab);
  let html='<nav class="bottomNav">';
  BOTTOM_TABS.forEach(([k,icon,label])=>{
    html+='<button class="bnItem'+(ui.tab===k?" on":"")+'" data-tab="'+k+'"><span class="bnIcon">'+icon+'</span><span class="bnLabel">'+label+'</span></button>';
  });
  html+='<button class="bnItem'+(moreActive||ui.moreMenuOpen?" on":"")+'" data-more-toggle="1"><span class="bnIcon">⋯</span><span class="bnLabel">Más</span></button>';
  html+='</nav>';

    html+='<div class="moreMenuOverlay" data-more-close="1"><div class="moreMenu" data-stop="1">';
    MORE_TABS.forEach(([k,label])=>{
      html+='<button class="moreMenuItem'+(ui.tab===k?" on":"")+'" data-tab="'+k+'" data-more-close="1">'+label+'</button>';

}


// desglose visual de bloques: warmup · 6×1000 @ ritmo (rec. 75″) · cooldown
function blockStructureHTML(blocks, P){
  return '<div class="blockRow">'+blocks.map(b=>{
    if(b.type==="warmup") return '<span class="blockChip blockWU">Calentamiento '+b.minutes+'′</span>';
    if(b.type==="cooldown") return '<span class="blockChip blockWU">Vuelta a la calma '+b.minutes+'′</span>';
    const pace=fmtPace(P[b.paceKey].v);
    let txt=workBlockLabel(b)+' @ '+pace+'/km';
    if(b.reps>1) txt+=' · rec. '+fmtRecovery(b.recoverySec||0)+(b.recoveryType==="jog"?" trote":"");
    return '<span class="blockChip blockWork">'+txt+'</span>';
  }).join('')+'</div>';
}

          '</div>' +

              const nextIsRace=pos<runOrder.length-1 && runOrder[pos+1].tipo==="CARRERA";
              const upDisabled=pos<=0||prevIsRace;

              return '<button class="ghostBtn small reorderBtn" data-swap="'+sess.id+'" data-dir="-1"'+(upDisabled?' disabled':'')+' title="Mover antes">▲</button>' +

    }
  });

  // sesiones ocultas esta semana (pospuestas o eliminadas): tarjeta reducida con "Deshacer"
  if(state.overrides){
    const raw=buildWeekRaw(w, state.profile.runDays, state.totalWeeks, state.event, state.goalPace);
    raw.forEach(sess=>{
      const ovKey="w"+w+"-"+sess.id;
      const st=state.overrides[ovKey];
      if(st!=="postponed" && st!=="deleted") return;
      const icon=ICONS[sess.tipo]||"🏃";
      const label=st==="postponed" ? "movida a la semana "+(w+1) : "eliminada";

    });
  }
  html+='</div>';
  return html;
}

/* ---------- calculadora de equivalencias de ritmo (Riegel) ---------- */
function calcEquivalentsHTML(){
  const c=ui.calc;
  const dists={"5":"5 km","10":"10 km","21.0975":"Media maratón","42.195":"Maratón"};
  let selDist='<div class="selRow">';
  for(const d in dists) selDist+='<button class="selBtn'+(c.dist===d?" on":"")+'" data-calcdist="'+d+'">'+dists[d]+'</button>';
  selDist+='</div>';

  let html='<div class="card" style="margin-top:18px">';
  html+='<div class="cardTitle">Calculadora de equivalencias</div>';
  html+='<div class="cardDetail">Introduce una marca reciente y calcula tu ritmo equivalente en otras distancias y para tus entrenamientos.</div>';
  html+='<label class="lbl">Distancia de la marca</label>'+selDist;
  html+='<label class="lbl">Tiempo conseguido</label>';
  html+='<input class="field" id="calc-time" inputmode="text" autocomplete="off" placeholder="ej. 45:30 o 1:35:00" value="'+esc(c.time)+'">';
  html+='<button class="cta" data-calc-equiv="1">Calcular equivalencias</button>';

  const distVal=parseFloat(c.dist);
  const timeVal=parseTimeStr(c.time);
  if(c.time && !timeVal){
    html+='<div class="trackerWarn">Formato no válido. Usa mm:ss (ej. 45:30) o h:mm:ss (ej. 1:35:00).</div>';
  } else if(timeVal){
    const basePace=timeVal/distVal; // s/km
    html+='<div class="logLine">Ritmo de la marca: <b>'+fmtPace(basePace)+'</b> /km</div>';

    html+='<div class="statChips" style="margin-top:10px;flex-wrap:wrap">';
    Object.entries(dists).forEach(([d,label])=>{
      const dd=parseFloat(d);
      const t = basePace*distVal * Math.pow(dd/distVal,1.06);
      html+='<div class="statChip"><span class="statChipLbl">'+label+'</span><span class="statChipVal">'+fmtTime(t)+'</span></div>';
    });
    html+='</div>';

    // ritmos de entrenamiento derivados de esta marca, usando la misma lógica que paces()
    const trainingP=paces(basePace, state.gap||9, "hm");
    html+='<div class="cardTitle" style="margin-top:14px;font-size:var(--fs-md)">Ritmos de entrenamiento equivalentes</div>';
    html+='<div class="paceGrid" style="margin-top:8px">';
    ["short","vo2","tempo","mara","long","easy"].forEach(k=>{
      if(!trainingP[k]) return;
      html+='<div class="paceCard"><div class="paceCardLbl">'+trainingP[k].label+'</div><div class="paceCardVal">'+fmtPace(trainingP[k].v)+'<span class="paceCardUnit">/km</span></div></div>';
    });
    html+='</div>';
    html+='<p class="note">Equivalencias calculadas con la fórmula de Riegel (exponente 1.06), igual que las predicciones del Resumen. Son una referencia: cuanto más distinta sea la distancia de la marca a la que quieres estimar, menos preciso es el resultado.</p>';
  }
  html+='</div>';
  return html;
}

/* ---------- calculadora de zonas de frecuencia cardíaca ---------- */
function calcHRZonesHTML(){
  const c=ui.calc;
  const age=parseInt(c.age), fcMaxInput=parseInt(c.fcMax), fcRest=parseInt(c.fcRest);
  const fcMax = fcMaxInput>0 ? fcMaxInput : (age>0 ? 220-age : null);

  let html='<div class="card" style="margin-top:14px">';
  html+='<div class="cardTitle">Zonas de frecuencia cardíaca</div>';
  html+='<div class="cardDetail">Indica tu FC máxima si la conoces (de una prueba de esfuerzo o un test real), o tu edad para una estimación aproximada (220 - edad). Si añades tu FC en reposo, se usa el método de Karvonen, más preciso.</div>';
  html+='<div class="grid3">' +
    '<div><label class="lbl">Edad</label><input class="field" id="calc-age" inputmode="numeric" placeholder="40" value="'+esc(c.age)+'"></div>' +
    '<div><label class="lbl">FC máxima (opcional)</label><input class="field" id="calc-fcmax" inputmode="numeric" placeholder="ej. 185" value="'+esc(c.fcMax)+'"></div>' +
    '<div><label class="lbl">FC en reposo (opcional)</label><input class="field" id="calc-fcrest" inputmode="numeric" placeholder="ej. 55" value="'+esc(c.fcRest)+'"></div>' +
  '</div>';
  html+='<button class="cta" data-calc-hr="1">Calcular zonas</button>';

  if(fcMax){
    if(!fcMaxInput && age>0) html+='<div class="note" style="margin-top:0">FC máxima estimada por edad: <b>'+fcMax+'</b> ppm (220 − '+age+'). Es una fórmula genérica con bastante variabilidad individual; si conoces tu FC máx real, indícala arriba para mayor precisión.</div>';
    const zones=[
      {n:1, label:"Z1 · Recuperación", lo:0.50, hi:0.60},
      {n:2, label:"Z2 · Aeróbico ligero", lo:0.60, hi:0.70},
      {n:3, label:"Z3 · Aeróbico (umbral)", lo:0.70, hi:0.80},
      {n:4, label:"Z4 · Umbral / tempo", lo:0.80, hi:0.90},
      {n:5, label:"Z5 · Máximo / VO2max", lo:0.90, hi:1.00},
    ];
    const useKarvonen = fcRest>0 && fcRest<fcMax;
    html+='<div class="sessionList" style="margin-top:10px">';
    zones.forEach(z=>{
      let lo,hi;
      if(useKarvonen){
        const reserve=fcMax-fcRest;
        lo=Math.round(fcRest+reserve*z.lo);
        hi=Math.round(fcRest+reserve*z.hi);
      } else {
        lo=Math.round(fcMax*z.lo);
        hi=Math.round(fcMax*z.hi);
      }
      html+='<div class="card" style="padding:12px 16px"><div class="cardFoot" style="justify-content:space-between;align-items:center">' +
        '<span style="font-weight:700">'+z.label+'</span>' +
        '<span style="font-family:var(--mono);font-weight:700">'+lo+'–'+hi+' ppm</span>' +
      '</div></div>';
    });
    html+='</div>';
    html+='<p class="note">'+(useKarvonen?"Calculado con el método de Karvonen (% de la reserva de frecuencia cardíaca: FCmáx − FCreposo).":"Calculado como % directo de tu FC máxima.")+' Estas zonas son orientativas: úsalas junto con tu percepción de esfuerzo (RPE), no como única referencia.</p>';
  }
  html+='</div>';
  return html;
}
